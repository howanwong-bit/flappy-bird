// ────────────────────────────────────────────────
//  Demo AI
// ────────────────────────────────────────────────
function demoAI() {
  if (gameState==='waiting') { jump(); return; }
  if (gameState!=='playing')  return;
  if (demoJumpCD > 0) demoJumpCD--;

  const pipe = pipes.filter(p=>p.x+PIPE_WIDTH>bird.x).sort((a,b)=>a.x-b.x)[0];
  let targetY = pipe ? pipe.topH + pipeGap/2 : H/2;
  targetY = Math.max(80, Math.min(H-GROUND_H-80, targetY));

  // Attack any enemy ahead (including inside pipe gaps) — charge while descending,
  // fire breath attack from distance to kill before bird reaches them
  const enemy = enemies.filter(e=>e.x>bird.x&&e.x<bird.x+380).sort((a,b)=>a.x-b.x)[0];
  if (enemy) {
    const needsClimb = bird.y > targetY + 30;
    // Glide+charge only while descending toward gap; stop to allow jumping when climbing
    inputHeld = !needsClimb && chargeLevel < 0.75;
  } else {
    inputHeld = false;
  }

  if (demoJumpCD > 0) return;

  const dist = pipe ? Math.max(1, pipe.x - bird.x - bird.radius) : 200;
  const dy   = bird.y - targetY; // positive = bird is below target

  // Urgency = how far below target relative to horizontal distance left
  // High when: large vertical gap + pipe approaching fast
  const urgency = Math.max(0, dy) / Math.max(1, dist);

  // Scale aggressiveness with urgency
  const vyThresh  = urgency > 0.5 ? -2  : urgency > 0.15 ? -1  : 0;
  const cooldown  = urgency > 0.5 ? 10  : urgency > 0.15 ? 15  : 20;
  const margin    = urgency > 0.5 ? 5   : urgency > 0.15 ? 12  : 20;

  // Short lookahead only when urgency warrants it
  const simFrames = urgency > 0.15 ? Math.min(Math.ceil(dist / pipeSpeed), 22) : 0;
  let pVy=bird.vy, pY=bird.y;
  for (let i=0;i<simFrames;i++) { pVy=Math.min(pVy+GRAVITY,14); pY+=pVy; }

  if ((bird.y > targetY + margin || pY > targetY + margin * 0.6) && bird.vy >= vyThresh) {
    jump();
    demoJumpCD = cooldown;
  }
}

// ────────────────────────────────────────────────
//  Update
// ────────────────────────────────────────────────
function update(now) {
  if (demoMode) demoAI();
  if (gameState!=='playing') return;

  prevGliding = gliding;
  gliding = inputHeld && bird.vy >= 0;

  // Glide → release: full charge = super attack, otherwise normal breath
  if (prevGliding && !gliding) {
    if (chargeLevel >= 0.999) spawnSuperAttack(bird.x+bird.radius, bird.y, selectedBird);
    else if (chargeLevel > 0.05) spawnBreathAttack(bird.x+bird.radius, bird.y, selectedBird, chargeLevel);
    chargeLevel = 0;
  }
  if (gliding) {
    chargeLevel = Math.min(1, chargeLevel + 0.016);
    bird.vy = Math.min(bird.vy + GLIDE_GRAV, GLIDE_MAX_VY);
    bird.wingAngle += 0.06;
  } else {
    bird.vy += GRAVITY; bird.wingAngle += 0.35;
  }
  bird.y += bird.vy;
  clouds.forEach(c=>{ c.x-=c.speed; if(c.x+c.w<0) c.x=W+c.w; });

  if (shieldActive) { shieldTimer--; if(shieldTimer<=0){shieldActive=false; shieldIsSuper=false;} }

  if (now-lastPipeTime>pipeInterval) spawnPipe(now);

  // Update pipes + score
  for (const p of pipes) {
    p.x-=pipeSpeed;
    if (!p.scored && p.x+PIPE_WIDTH<bird.x) {
      p.scored=true; score++;
      // Check level up every 10 points
      const newLevel=Math.floor(score/10);
      if (newLevel>currentLevel) {
        currentLevel=newLevel; levelUpTimer=90;
        updateDiffForLevel(); playLevelUp();
      } else {
        playScore2();
      }
    }
  }
  pipes=pipes.filter(p=>p.x+PIPE_WIDTH+15>0);

  // Coins
  coins.forEach(c=>{ c.x-=pipeSpeed; });
  coins.forEach(c=>{
    if(!c.collected){ const dx=c.x-bird.x,dy=c.y-bird.y; if(dx*dx+dy*dy<(bird.radius+10)**2){ c.collected=true; score+=2; playCoin(); flashTimer=8; flashColor='rgb(255,220,0)'; } }
  });
  coins=coins.filter(c=>c.x>-20&&!c.collected);

  // Power-ups
  powerUps.forEach(p=>{ p.x-=pipeSpeed; });
  powerUps.forEach(p=>{
    if(!p.collected){ const dx=p.x-bird.x,dy=p.y-bird.y; if(dx*dx+dy*dy<(bird.radius+14)**2){
      p.collected=true; shieldActive=true;
      if(p.type==='superShield'){ shieldTimer=450; shieldIsSuper=true; flashTimer=18; flashColor='rgb(255,200,0)'; }
      else { shieldTimer=180; shieldIsSuper=false; flashTimer=12; flashColor='rgb(80,160,255)'; }
      playShield();
    } }
  });
  powerUps=powerUps.filter(p=>p.x>-30&&!p.collected);

  // Enemies — move, then check contact
  if (now-lastEnemyTime>enemyInterval) spawnEnemy(now);
  enemies.forEach(e=>{ e.x-=ENEMY_TYPES[e.type].speed*pipeSpeed; });
  if (!shieldActive) {
    for (let i=enemies.length-1; i>=0; i--) {
      const e=enemies[i];
      const dx=Math.abs(bird.x-e.x), dy=Math.abs(bird.y-e.y);
      if (dx<bird.radius+e.hw-3 && dy<bird.radius+e.hh-3) {
        if (gliding) {
          enemies.splice(i,1); demonsKilled++;
          spawnSlash(e.x, e.y, selectedBird);
          score+=5; playSlash();
          flashTimer=12; flashColor=SLASH_FLASH[selectedBird];
        } else if (!invincible) {
          gameState='dead'; gliding=false; inputHeld=false; stopMusic(); playDeath();
          flashTimer=25; flashColor='rgb(255,50,50)';
          if (score>0) setTimeout(showNameOverlay,500);
          return;
        }
      }
    }
  }
  enemies=enemies.filter(e=>e.x+e.hw*2>0);

  // Breath attacks — move + kill enemies
  for (let i=breathAttacks.length-1; i>=0; i--) {
    const a=breathAttacks[i];
    a.t++; a.x+=a.vx;
    a.life -= a.birdIdx===1 ? 0.055 : 0.018;
    if (a.life<=0||a.x>W+120) { breathAttacks.splice(i,1); continue; }
    for (let j=enemies.length-1; j>=0; j--) {
      const e=enemies[j];
      if (Math.abs(a.x-e.x)<a.hw+e.hw && Math.abs(a.y-e.y)<a.hh+e.hh) {
        enemies.splice(j,1); demonsKilled++; score+=5;
        spawnSlash(e.x, e.y, a.birdIdx); playSlash();
        flashTimer=8; flashColor=SLASH_FLASH[a.birdIdx];
      }
    }
  }

  // Super attacks — move + wipe enemies across half-screen height
  for (let i=superAttacks.length-1; i>=0; i--) {
    const a=superAttacks[i];
    a.t++; a.x+=a.vx;
    a.life -= 0.010; // slow fade — lingers impressively
    if (a.life<=0||a.x>W+200) { superAttacks.splice(i,1); continue; }
    for (let j=enemies.length-1; j>=0; j--) {
      const e=enemies[j];
      if (Math.abs(a.x-e.x)<a.hw+e.hw && Math.abs(a.y-e.y)<a.hh) {
        enemies.splice(j,1); demonsKilled++; score+=5;
        spawnSlash(e.x, e.y, a.birdIdx); playSlash();
        flashTimer=6; flashColor=SLASH_FLASH[a.birdIdx];
      }
    }
  }

  // Pipe-break shards physics
  pipeBreaks.forEach(s=>{ s.x+=s.vx; s.y+=s.vy; s.vy+=0.28; s.vx*=0.97; s.rot+=s.rotV; s.life-=0.025; });
  pipeBreaks=pipeBreaks.filter(s=>s.life>0);
  if (shakeTimer>0) shakeTimer--;

  emitTrail(BIRD_DEFS[selectedBird]);
  updateParticles();

  if (checkCollision()) {
    gameState='dead'; gliding=false; inputHeld=false; stopMusic(); playDeath();
    flashTimer=25; flashColor='rgb(255,50,50)';
    if (demoMode) { setTimeout(()=>{ if(demoMode){ initGame(); gameState='waiting'; startMusic(); } }, 1800); return; }
    if (score>0) setTimeout(showNameOverlay,500);
  }
}

// ────────────────────────────────────────────────
//  Main loop
// ────────────────────────────────────────────────
const FRAME_MS = 1000 / 60; // lock physics to 60 fps
let _lastFrameTime = 0;
function loop(now) {
  const elapsed = now - _lastFrameTime;
  if (elapsed < FRAME_MS - 1) { requestAnimationFrame(loop); return; }
  _lastFrameTime = now - (elapsed % FRAME_MS);
  ctx.clearRect(0,0,W,H);

  if (gameState==='select') {
    drawSelectScreen();
  } else if (gameState==='leaderboard') {
    drawLeaderboard();
  } else {
    const shake = shakeTimer > 0 ? (Math.random()-0.5)*shakeAmt*2 : 0;
    const shakeY = shakeTimer > 0 ? (Math.random()-0.5)*shakeAmt : 0;
    if (shakeTimer > 0) { ctx.save(); ctx.translate(shake, shakeY); }
    drawSky(); drawStars(); drawMoon(); drawMountains();
    clouds.forEach(drawCloud);
    pipes.forEach(drawPipe);
    coins.forEach(drawCoin);
    powerUps.forEach(drawPowerUp);
    enemies.forEach(drawEnemy);
    drawBreathAttacks();
    drawSuperAttacks();
    drawSlashEffects();
    drawPipeBreaks();
    drawParticles();
    drawGround(gameState==='playing');

    const def=BIRD_DEFS[selectedBird];
    const angle=(gameState==='playing'||gameState==='dead')
      ?Math.min(Math.max(bird.vy*3,-25),75)*Math.PI/180:0;
    drawChargingAura(bird.x, bird.y);
    drawBirdAt(bird.x,bird.y,def,angle,bird.wingAngle);
    drawHUD();
    if (shakeTimer > 0) ctx.restore();
    update(now);
  }
  requestAnimationFrame(loop);
}

bird = { x:W*0.2, y:H/2, vy:0, radius:16, wingAngle:0 };
particles=[]; coins=[]; powerUps=[]; enemies=[]; slashEffects=[]; breathAttacks=[]; superAttacks=[]; pipeBreaks=[];
demonsKilled=0; chargeLevel=0; currentLevel=0; lastEnemyTime=0; shakeTimer=0;
requestAnimationFrame(loop);
</script>
