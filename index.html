<!DOCTYPE html>

    * { margin: 0; padding: 0; box-sizing: border-box; }

      background: #0d0010;

      display: none;
      position: fixed; inset: 0;
      background: #0d0010;

      text-align: center;

      font-weight: bold;
    }

      background: #0d0020; color: #fff; outline: none;
      margin-bottom: 10px; text-align: center;

// ────────────────────────────────────────────────
//  Global leaderboard — Firebase Realtime Database
//  HOW TO SET UP (one time):
//  1. Go to https://console.firebase.google.com
//  2. Create a project → Build → Realtime Database → Create database
//  3. Choose "Start in test mode" (allows public read/write)
//  4. Copy your database URL (e.g. https://your-project-default-rtdb.firebaseio.com)
//  5. Paste it below replacing the empty string
// ────────────────────────────────────────────────
const FIREBASE_URL = '';  // ← paste your Firebase Realtime Database URL here

let globalScores = null;   // null = not yet loaded, [] = loaded (may be empty)
let globalScoresLoading = false;

async function fetchGlobalScores() {
  if (!FIREBASE_URL) return;
  globalScoresLoading = true;
  try {
    const res = await fetch(`${FIREBASE_URL}/scores.json`);
    const data = await res.json();
    if (data && typeof data === 'object') {
      const arr = Object.values(data)
        .filter(e => e && typeof e.score === 'number')
        .sort((a, b) => b.score - a.score)
        .slice(0, 25);
      globalScores = arr;
      // also cache locally so leaderboard works offline
      localStorage.setItem('flappyDSScoresGlobal', JSON.stringify(arr));
    } else {
      globalScores = [];
    }
  } catch { globalScores = []; }
  globalScoresLoading = false;
}

async function pushGlobalScore(entry) {
  if (!FIREBASE_URL) return;
  try {
    await fetch(`${FIREBASE_URL}/scores.json`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(entry),
    });
    fetchGlobalScores(); // refresh
  } catch { /* offline — local save still happened */ }
}

// Pre-load global scores on page load
fetchGlobalScores();

function scaleMobileCanvas() {
  if (!isMobile) return;

  canvas.style.width  = Math.round(W * scale) + 'px';
  canvas.style.height = Math.round(H * scale) + 'px';

function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();

function toneAt(f, type, vol, dur, t) {
  const ac=getAC(), o=ac.createOscillator(), g=ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type=type; o.frequency.setValueAtTime(f,t);
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.start(t); o.stop(t+dur+0.05);
}
function sfx(f,type,vol,dur,d=0){ toneAt(f,type,vol,dur,getAC().currentTime+d); }

const DRUM_BEATS = [
  ['kick',0.28],['rest'],['snare',0.18],['rest'],
  ['kick',0.28],['hit',0.12],['snare',0.18],['rest'],
].map(b=>b[0]==='rest'?[0,0,Q]:[b[0]==='kick'?60:b[0]==='snare'?200:440, b[1], Q]);

function scheduleDrum(t, vol, freq) {
  const ac=getAC(), o=ac.createOscillator(), g=ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type='sine'; o.frequency.setValueAtTime(freq,t);
  o.frequency.exponentialRampToValueAtTime(freq*0.1,t+0.08);
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
  o.start(t); o.stop(t+0.15);
}

function scheduleSong() {
  if (!musicOn) return;
  const ac=getAC(), ahead=0.35;
  while (melNext  < ac.currentTime+ahead) { const [f,d]=ACTION_MELODY[melIdx%ACTION_MELODY.length]; if(f) toneAt(f,'square',0.052,d*0.78,melNext); melNext+=d; melIdx++; }
  while (bassNext < ac.currentTime+ahead) { const [f,d]=ACTION_BASS[bassIdx%ACTION_BASS.length]; if(f) toneAt(f,'triangle',0.07,d*0.62,bassNext); bassNext+=d; bassIdx++; }
  while (drumNext < ac.currentTime+ahead) { const [f,v,d]=DRUM_BEATS[drumIdx%DRUM_BEATS.length]; if(f) scheduleDrum(drumNext,v,f); drumNext+=d; drumIdx++; }
  melTimer = setTimeout(scheduleSong,80);
}

function startMusic() {
  if (musicOn) return;
  musicOn=true;
  const ac=getAC();
  melNext=bassNext=drumNext=ac.currentTime+0.08;
  melIdx=bassIdx=drumIdx=0;
  scheduleSong();
}
function stopMusic() { musicOn=false; clearTimeout(melTimer); }

function getLocalScores() { try { return JSON.parse(localStorage.getItem('flappyDSScores')||'[]'); } catch { return []; } }
function getScores() {
  // Return global scores if available, else local, else cached global
  if (globalScores) return globalScores;
  try { const c=JSON.parse(localStorage.getItem('flappyDSScoresGlobal')||'null'); if(c) return c; } catch {}
  return getLocalScores();
}
function isGlobalLeaderboard() {
  return !!(FIREBASE_URL && (globalScores || localStorage.getItem('flappyDSScoresGlobal')));
}
function saveScore(name, sc, diff, stage) {
  // Always save to local storage
  let s=getLocalScores();
  const entry={ name:(name||'').trim()||'Anonymous', score:sc, diff, stage, date:new Date().toLocaleDateString() };
  s.push(entry);
  s.sort((a,b)=>b.score-a.score);
  localStorage.setItem('flappyDSScores', JSON.stringify(s.slice(0,10)));
  // Also push to global leaderboard
  pushGlobalScore(entry);
}

function updateDiffForLevel() {
  const base = DIFF_DEFS[selectedDiff];
  // Every level: +7% speed (cap ×1.7), -5% gap (floor 88px), -8% interval (floor 580ms)
  const f = Math.min(currentLevel*0.07, 0.70);
  pipeSpeed    = base.speed    * (1 + f);
  pipeGap      = Math.max(base.minGap, Math.round(base.gap      * (1 - f*0.55)));
  pipeInterval = Math.max(580,         Math.round(base.interval * (1 - f*0.62)));
  skyTheme     = Math.min(3, Math.floor(currentLevel/2));
  const baseEI = {easy:7000,medium:4800,hard:3000}[selectedDiff];
  enemyInterval = Math.max(1600, Math.round(baseEI * (1 - f*0.5)));
}

function initGame() {
  updateDiffForLevel();
  bird       = { x:W*0.2, y:H/2, vy:0, radius:16, wingAngle:0 };
  pipes      = []; coins=[]; powerUps=[]; particles=[]; enemies=[]; slashEffects=[]; breathAttacks=[]; superAttacks=[]; pipeBreaks=[];
  demonsKilled=0; chargeLevel=0; prevGliding=false;
  score=0; lastPipeTime=0; lastEnemyTime=0; currentLevel=0; levelUpTimer=0;
  shieldActive=false; shieldTimer=0; shieldIsSuper=false; flashTimer=0; flashColor='#fff';
  gliding=false; inputHeld=false; skyTheme=0; demoJumpCD=0;
}

function spawnPipe(now) {
  const minTop=70, maxTop=H-GROUND_H-pipeGap-70;

  // Limit how far the gap centre can shift from the previous pipe.
  // Max shift scales with how much horizontal runway the player has:
  //   runway (px) = pipeInterval(ms)/1000 * 60fps * pipeSpeed
  // Allow the bird to travel at most ~70% of that vertically.
  const runway    = (pipeInterval / 1000) * 60 * pipeSpeed;
  const maxShift  = runway * 0.70;   // max vertical center change between pipes
  let topH;
  const prevPipe  = pipes.length ? pipes[pipes.length-1] : null;
  if (prevPipe) {
    const prevCenter = prevPipe.baseTopH + pipeGap / 2;
    const lo = Math.max(minTop + pipeGap/2, prevCenter - maxShift);
    const hi = Math.min(maxTop + pipeGap/2, prevCenter + maxShift);
    const center = lo + Math.random() * (hi - lo);
    topH = Math.max(minTop, Math.min(maxTop, center - pipeGap/2));
  } else {
    topH = minTop + Math.random() * (maxTop - minTop);
  }
  const pipe  = { x:W, topH, baseTopH:topH, oscPhase:Math.random()*Math.PI*2,
                  oscAmp: currentLevel>=3 ? Math.min(30, (currentLevel-3)*8+8) : 0,
                  oscSpeed: 0.022+currentLevel*0.003 };
  pipes.push(pipe);

  // Coin in the gap (70% chance)
  if (Math.random()<0.70) {
    const mid=topH+pipeGap/2, vary=pipeGap*0.3;
    coins.push({ x:W+PIPE_WIDTH/2, y:mid+(Math.random()-0.5)*vary*2,
                 spin:Math.random()*Math.PI*2, collected:false });
  }
  // Shield orbs: 5% super shield, else 15% normal shield (mutually exclusive)
  const rng=Math.random();
  if (rng<0.05) {
    const mid=topH+pipeGap/2;
    powerUps.push({ type:'superShield', x:W+PIPE_WIDTH+60+Math.random()*80,
                    y:mid+(Math.random()-0.5)*pipeGap*0.4,
                    pulse:Math.random()*Math.PI*2, collected:false });
  } else if (rng<0.20) {
    const mid=topH+pipeGap/2;
    powerUps.push({ type:'shield', x:W+PIPE_WIDTH+60+Math.random()*80,
                    y:mid+(Math.random()-0.5)*pipeGap*0.4,
                    pulse:Math.random()*Math.PI*2, collected:false });
  }
  lastPipeTime=now;
}

function checkCollision() {
  const protected_ = shieldActive || invincible;
  // Ground / ceiling
  if (bird.y+bird.radius>=H-GROUND_H || bird.y-bird.radius<=0) return !protected_;
  // Pipes
  for (let i=pipes.length-1; i>=0; i--) {
    const p=pipes[i];
    if (bird.x+bird.radius-2>p.x && bird.x-bird.radius+2<p.x+PIPE_WIDTH) {
      if (bird.y-bird.radius+2<p.topH || bird.y+bird.radius-2>p.topH+pipeGap) {
        if (protected_) {
          spawnPipeBreak(p);
          pipes.splice(i,1);
          if (shieldActive) { shieldActive=false; shieldTimer=0; shieldIsSuper=false; }
          flashTimer=10; flashColor='rgb(180,150,80)';
          playPipeBreak();
          shakeTimer=12; shakeAmt=7;
        } else { return true; }
      }
    }
  }
  return false;
}

function spawnPipeBreak(p) {
  const col1 = skyTheme>=3?'#5a1a00':skyTheme>=2?'#3d5a00':'#3dba4e';
  const col2 = skyTheme>=3?'#3a0a00':skyTheme>=2?'#2a3d00':'#2ea040';
  const capC = skyTheme>=3?'#220800':skyTheme>=2?'#1a2800':'#26803c';
  const ix=Math.min(bird.x+bird.radius, p.x+PIPE_WIDTH-4);
  const iy=bird.y<p.topH+pipeGap/2 ? p.topH : p.topH+pipeGap;

  // Rectangular pipe shards
  for (let i=0;i<16;i++) {
    const ang=Math.random()*Math.PI*2, spd=3.5+Math.random()*7;
    pipeBreaks.push({
      x:ix+(Math.random()-0.5)*PIPE_WIDTH*0.8, y:iy+(Math.random()-0.5)*18,
      vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd-2,
      w:7+Math.random()*22, h:5+Math.random()*11,
      rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.28,
      life:1, color:[col1,col1,col2,capC][Math.floor(Math.random()*4)],
    });
  }
  // Impact ripple via particle system
  particles.push({ x:ix, y:iy, vx:0, vy:0, life:1, color:'rgba(200,220,140,0.9)', size:4, type:'ripple', maxSize:42 });
  // Dust puff
  for (let i=0;i<6;i++) {
    const ang=Math.random()*Math.PI*2;
    particles.push({ x:ix, y:iy, vx:Math.cos(ang)*(1+Math.random()*3), vy:Math.sin(ang)*(1+Math.random()*2)-1,
      life:1, color:col1, size:2+Math.random()*3 });
  }
}

function drawPipeBreaks() {
  pipeBreaks.forEach(s=>{
    ctx.save(); ctx.globalAlpha=s.life*0.92;
    ctx.translate(s.x,s.y); ctx.rotate(s.rot);
    ctx.fillStyle=s.color; ctx.fillRect(-s.w/2,-s.h/2,s.w,s.h);
    ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.fillRect(-s.w/2,-s.h/2,s.w,2.5);
    ctx.fillStyle='rgba(0,0,0,0.25)';       ctx.fillRect(-s.w/2, s.h/2-2.5,s.w,2.5);
    ctx.restore();
  });
  ctx.globalAlpha=1;
}

// Type 0 — Flesh Demon (straight flyer, stage 0+)

const ENEMY_TYPES = [
  { hw:18, hh:16, speed:1.00, waveAmp:0,   waveFreq:0 },  // Flesh Demon
  { hw:22, hh:19, speed:0.75, waveAmp:28,  waveFreq:0.032 },  // Spider Demon
  { hw:20, hh:18, speed:1.55, waveAmp:18,  waveFreq:0.048 },  // Upper Moon
];

function spawnEnemy(now) {
  const maxType = currentLevel>=4 ? 2 : currentLevel>=2 ? 1 : 0;
  const type    = Math.floor(Math.random()*(maxType+1));
  const et      = ENEMY_TYPES[type];
  const minY=80, maxY=H-GROUND_H-80;
  enemies.push({ type, x:W+60, baseY:minY+Math.random()*(maxY-minY), y:0,
    vx:pipeSpeed*et.speed, phase:Math.random()*Math.PI*2, t:0,
    hw:et.hw, hh:et.hh });
  lastEnemyTime=now;
}

function drawFleshDemon(x,y,t) {
  ctx.save(); ctx.translate(x,y);
  const p=1+Math.sin(t*0.05)*0.05; ctx.scale(p,p);
  // body
  const bg=ctx.createRadialGradient(-3,-3,2,0,0,18);
  bg.addColorStop(0,'#8b1010'); bg.addColorStop(0.6,'#5a0000'); bg.addColorStop(1,'#2d0000');
  ctx.fillStyle=bg; ctx.beginPath(); ctx.ellipse(0,0,18,16,0,0,Math.PI*2); ctx.fill();
  // horns
  ctx.fillStyle='#3d0000';
  ctx.beginPath(); ctx.moveTo(-8,-12); ctx.lineTo(-5,-23); ctx.lineTo(-2,-12); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(6,-12);  ctx.lineTo(9,-23);  ctx.lineTo(12,-12); ctx.closePath(); ctx.fill();
  // glowing eyes
  ctx.shadowColor='#ff0000'; ctx.shadowBlur=10;
  ctx.fillStyle='#ff2200';
  ctx.beginPath(); ctx.ellipse(-6,-3,5,4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6,-3,5,4,0,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#ff7700'; ctx.beginPath(); ctx.arc(-6,-3,2.5,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(6,-3,2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111';    ctx.beginPath(); ctx.arc(-6,-3,1.2,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(6,-3,1.2,0,Math.PI*2); ctx.fill();
  // mouth + fangs
  ctx.fillStyle='#1a0000'; ctx.beginPath(); ctx.moveTo(-8,6); ctx.quadraticCurveTo(0,14,8,6); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#ddd';
  ctx.beginPath(); ctx.moveTo(-5,6); ctx.lineTo(-3,13); ctx.lineTo(-1,6); ctx.fill();
  ctx.beginPath(); ctx.moveTo(3,6);  ctx.lineTo(5,13);  ctx.lineTo(7,6);  ctx.fill();
  ctx.restore();
}

function drawSpiderDemon(x,y,t) {
  ctx.save(); ctx.translate(x,y);
  // animated legs
  ctx.strokeStyle='#aaa'; ctx.lineWidth=2; ctx.lineCap='round';
  for (let i=0;i<3;i++) {
    const la=Math.sin(t*0.08+i*0.8)*9;
    const ox=i*5-5;
    ctx.beginPath(); ctx.moveTo(-14,ox-4); ctx.lineTo(-26,la-12+ox); ctx.lineTo(-34,la*0.5+ox); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(14, ox-4); ctx.lineTo(26, la-12+ox); ctx.lineTo(34, la*0.5+ox); ctx.stroke();
  }
  // body
  const bg=ctx.createRadialGradient(-3,-2,2,0,0,16);
  bg.addColorStop(0,'#e0d0f0'); bg.addColorStop(0.5,'#b090cc'); bg.addColorStop(1,'#6a3a8a');
  ctx.fillStyle=bg; ctx.beginPath(); ctx.ellipse(0,0,16,14,0,0,Math.PI*2); ctx.fill();
  // web lines
  ctx.strokeStyle='rgba(200,160,230,0.4)'; ctx.lineWidth=1;
  [0,Math.PI/4,Math.PI/2,3*Math.PI/4].forEach(a=>{
    ctx.beginPath(); ctx.moveTo(Math.cos(a)*-16,Math.sin(a)*-16); ctx.lineTo(Math.cos(a)*16,Math.sin(a)*16); ctx.stroke();
  });
  // 4 eyes
  ctx.shadowColor='#cc0066'; ctx.shadowBlur=6;
  ctx.fillStyle='#ff0088';
  [[-8,-5],[-2,-7],[4,-7],[9,-5]].forEach(([ex,ey])=>{ ctx.beginPath(); ctx.arc(ex,ey,3,0,Math.PI*2); ctx.fill(); });
  ctx.shadowBlur=0;
  // fang mouth
  ctx.fillStyle='#2d0018'; ctx.beginPath(); ctx.arc(0,5,7,0,Math.PI); ctx.fill();
  ctx.fillStyle='#ddd';
  ctx.beginPath(); ctx.moveTo(-5,5); ctx.lineTo(-3,12); ctx.lineTo(-1,5); ctx.fill();
  ctx.beginPath(); ctx.moveTo(3,5);  ctx.lineTo(5,12);  ctx.lineTo(7,5);  ctx.fill();
  ctx.restore();
}

function drawUpperMoon(x,y,t) {
  ctx.save(); ctx.translate(x,y);
  const p=1+Math.sin(t*0.06)*0.08; ctx.scale(p,p);
  // outer aura
  const aura=ctx.createRadialGradient(0,0,8,0,0,28);
  aura.addColorStop(0,'rgba(120,0,220,0)'); aura.addColorStop(0.6,'rgba(100,0,200,0.18)'); aura.addColorStop(1,'rgba(60,0,120,0)');
  ctx.fillStyle=aura; ctx.beginPath(); ctx.arc(0,0,28,0,Math.PI*2); ctx.fill();
  // body
  const bg=ctx.createRadialGradient(-4,-4,3,0,0,20);
  bg.addColorStop(0,'#7000dd'); bg.addColorStop(0.5,'#420090'); bg.addColorStop(1,'#1a0040');
  ctx.fillStyle=bg; ctx.beginPath(); ctx.ellipse(0,0,20,18,0,0,Math.PI*2); ctx.fill();
  // rotating markings
  ctx.strokeStyle='rgba(200,100,255,0.45)'; ctx.lineWidth=1;
  for (let i=0;i<4;i++){
    const a=i*Math.PI/2+t*0.025;
    ctx.beginPath(); ctx.moveTo(Math.cos(a)*9,Math.sin(a)*9); ctx.lineTo(Math.cos(a)*19,Math.sin(a)*19); ctx.stroke();
  }
  // kanji on forehead
  ctx.fillStyle='rgba(255,210,255,0.7)'; ctx.font='bold 10px Arial'; ctx.textAlign='center';
  ctx.fillText('上',0,-5);
  // glowing eyes
  ctx.shadowColor='#bb00ff'; ctx.shadowBlur=12;
  ctx.fillStyle='#dd55ff';
  ctx.beginPath(); ctx.ellipse(-7,3,5,4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(7,3,5,4,0,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#220044'; ctx.beginPath(); ctx.arc(-7,3,2.2,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(7,3,2.2,0,Math.PI*2); ctx.fill();
  // wide grin + fangs
  ctx.strokeStyle='#cc55ff'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(-9,10); ctx.quadraticCurveTo(0,17,9,10); ctx.stroke();
  ctx.fillStyle='#eeddff';
  ctx.beginPath(); ctx.moveTo(-5,10); ctx.lineTo(-3,16); ctx.lineTo(-1,10); ctx.fill();
  ctx.beginPath(); ctx.moveTo(3,10);  ctx.lineTo(5,16);  ctx.lineTo(7,10);  ctx.fill();
  ctx.restore();
}

function drawEnemy(e) {
  e.t++;
  const et=ENEMY_TYPES[e.type];
  e.y = e.baseY + Math.sin(e.t*et.waveFreq+e.phase)*et.waveAmp;
  if      (e.type===0) drawFleshDemon(e.x,e.y,e.t);
  else if (e.type===1) drawSpiderDemon(e.x,e.y,e.t);
  else                 drawUpperMoon(e.x,e.y,e.t);
}

// ────────────────────────────────────────────────
//  Breath charge aura (drawn around bird while gliding)
// ────────────────────────────────────────────────
function drawChargingAura(x, y) {
  if (chargeLevel <= 0) return;
  const c=chargeLevel, t=performance.now()*0.001;
  ctx.save(); ctx.translate(x,y);

  if (selectedBird===0) {
    // Tanjiro — water vortex spiral + orbiting droplets
    ctx.shadowColor='#33aaff'; ctx.shadowBlur=18*c;
    const gc=ctx.createRadialGradient(0,0,16,0,0,30+c*14);
    gc.addColorStop(0,'rgba(80,180,255,0)'); gc.addColorStop(0.5,`rgba(80,180,255,${c*0.28})`); gc.addColorStop(1,'rgba(80,180,255,0)');
    ctx.globalAlpha=1; ctx.fillStyle=gc; ctx.beginPath(); ctx.arc(0,0,30+c*14,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=`rgba(80,210,255,${c*0.75})`; ctx.lineWidth=2;
    ctx.beginPath();
    for (let a=0;a<Math.PI*4*c;a+=0.12){
      const r=(6+a*4.5)*Math.min(1,c*1.6), px=Math.cos(a-t*3)*r, py=Math.sin(a-t*3)*r;
      a<0.12?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.stroke();
    for (let i=0;i<6;i++){
      const a=t*4+i*Math.PI*2/6, r=22+c*12;
      ctx.globalAlpha=c*0.85; ctx.fillStyle='#88ddff';
      ctx.beginPath(); ctx.arc(Math.cos(a)*r,Math.sin(a)*r,3+c*2.5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(220,248,255,0.8)';
      ctx.beginPath(); ctx.arc(Math.cos(a)*r-1,Math.sin(a)*r-1,1.2,0,Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur=0;

  } else if (selectedBird===1) {
    // Zenitsu — crackling electric field, white-hot core at full charge
    ctx.shadowColor='#ffee00'; ctx.shadowBlur=22*c;
    const gc=ctx.createRadialGradient(0,0,14,0,0,32+c*14);
    gc.addColorStop(0,'rgba(255,238,0,0)'); gc.addColorStop(0.5,`rgba(255,220,0,${c*0.32})`); gc.addColorStop(1,'rgba(255,180,0,0)');
    ctx.globalAlpha=0.8+Math.sin(t*12)*0.2; ctx.fillStyle=gc; ctx.beginPath(); ctx.arc(0,0,32+c*14,0,Math.PI*2); ctx.fill();
    for (let i=0;i<Math.ceil(c*8);i++){
      const a=(i/8)*Math.PI*2+t*9, r0=18, r1=28+c*10;
      ctx.globalAlpha=c*(0.5+Math.random()*0.5); ctx.strokeStyle='rgba(255,240,80,0.95)'; ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*r0,Math.sin(a)*r0);
      ctx.lineTo(Math.cos(a)*(r0+(r1-r0)*0.5)+(Math.random()-0.5)*9,Math.sin(a)*(r0+(r1-r0)*0.5)+(Math.random()-0.5)*9);
      ctx.lineTo(Math.cos(a)*r1+(Math.random()-0.5)*5,Math.sin(a)*r1+(Math.random()-0.5)*5);
      ctx.stroke();
    }
    if (c>0.7){
      ctx.globalAlpha=(c-0.7)/0.3*0.65; ctx.fillStyle='rgba(255,255,220,0.95)';
      ctx.beginPath(); ctx.arc(0,0,15,0,Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur=0;

  } else if (selectedBird===2) {
    // Inosuke — four spinning arc slashes with claw tips
    ctx.shadowColor='#44ffaa'; ctx.shadowBlur=14*c;
    for (let i=0;i<5;i++){
      const a=t*5+i*Math.PI*2/5, r=22+c*10;
      ctx.globalAlpha=c*(0.55+Math.sin(t*6+i)*0.25); ctx.strokeStyle='rgba(85,255,170,0.95)'; ctx.lineWidth=2.8; ctx.lineCap='round';
      ctx.beginPath(); ctx.arc(0,0,r,a,a+0.85); ctx.stroke();
      ctx.globalAlpha=c*0.8; ctx.fillStyle='rgba(85,255,170,0.7)';
      ctx.beginPath(); ctx.arc(Math.cos(a+0.85)*r,Math.sin(a+0.85)*r,2.5+c*2,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=c*0.35; ctx.strokeStyle='#55ffaa'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(0,0,30+c*8,0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0;

  } else if (selectedBird===3) {
    // Rengoku — intensifying flame corona spikes → tornado
    ctx.shadowColor='#ff4400'; ctx.shadowBlur=26*c;
    const spikes=Math.ceil(6+c*7);
    for (let i=0;i<spikes;i++){
      const a=t*2.8+i*Math.PI*2/spikes, fh=14+c*22+Math.sin(t*5+i)*6;
      const g=ctx.createLinearGradient(Math.cos(a)*16,Math.sin(a)*16,Math.cos(a)*(16+fh),Math.sin(a)*(16+fh));
      g.addColorStop(0,`rgba(255,200,0,${c*0.95})`); g.addColorStop(1,'rgba(255,50,0,0)');
      ctx.globalAlpha=c; ctx.strokeStyle=g; ctx.lineWidth=3+c*2.5;
      ctx.beginPath(); ctx.moveTo(Math.cos(a)*16,Math.sin(a)*16); ctx.lineTo(Math.cos(a)*(16+fh),Math.sin(a)*(16+fh)); ctx.stroke();
    }
    ctx.globalAlpha=c*0.4;
    const gc2=ctx.createRadialGradient(0,0,0,0,0,20);
    gc2.addColorStop(0,'rgba(255,255,160,1)'); gc2.addColorStop(0.5,'rgba(255,130,0,0.6)'); gc2.addColorStop(1,'rgba(255,40,0,0)');
    ctx.fillStyle=gc2; ctx.beginPath(); ctx.arc(0,0,20,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;

  } else if (selectedBird===4) {
    // Shinobu — orbiting butterfly wings + poison haze
    ctx.shadowColor='#cc44ff'; ctx.shadowBlur=18*c;
    const gc=ctx.createRadialGradient(0,0,14,0,0,30+c*12);
    gc.addColorStop(0,'rgba(190,80,255,0)'); gc.addColorStop(0.5,`rgba(190,80,255,${c*0.22})`); gc.addColorStop(1,'rgba(190,80,255,0)');
    ctx.globalAlpha=1; ctx.fillStyle=gc; ctx.beginPath(); ctx.arc(0,0,30+c*12,0,Math.PI*2); ctx.fill();
    // orbiting butterfly silhouettes
    for (let i=0;i<4;i++){
      const a=t*3.5+i*Math.PI/2, r=20+c*10;
      const bx=Math.cos(a)*r, by=Math.sin(a)*r;
      ctx.globalAlpha=c*0.75; ctx.fillStyle=i%2===0?'#cc66ff':'#ffaaff';
      ctx.beginPath(); ctx.ellipse(bx-2.5,by,4,2.5,a,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(bx+2.5,by,4,2.5,a,0,Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur=0;

  } else if (selectedBird===5) {
    // Tengen — expanding sound rings + gem flashes
    ctx.shadowColor='#ffd000'; ctx.shadowBlur=20*c;
    for (let i=0;i<Math.ceil(c*5);i++){
      const rad=16+i*10+c*8, a=c*(0.5+Math.sin(t*7+i)*0.35);
      ctx.globalAlpha=a; ctx.strokeStyle=`rgba(255,220,60,${a})`; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.arc(0,0,rad,0,Math.PI*2); ctx.stroke();
    }
    for (let i=0;i<6;i++){
      const a=t*5+i*Math.PI/3, r=24+c*10;
      ctx.globalAlpha=c*0.9; ctx.fillStyle=i%2===0?'#ffe060':'#ff8833';
      ctx.beginPath(); ctx.arc(Math.cos(a)*r,Math.sin(a)*r,2+c*2,0,Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur=0;

  } else if (selectedBird===6) {
    // Muichiro — slow-drifting mist cloud
    ctx.shadowColor='#44ddcc'; ctx.shadowBlur=16*c;
    for (let i=0;i<Math.ceil(c*6);i++){
      const a=t*1.5+i*Math.PI*2/6, r=18+c*14, drift=Math.sin(t*2+i)*4;
      const gc2=ctx.createRadialGradient(Math.cos(a)*r+drift,Math.sin(a)*r,0,Math.cos(a)*r+drift,Math.sin(a)*r,8+c*6);
      gc2.addColorStop(0,`rgba(80,220,210,${c*0.4})`); gc2.addColorStop(1,'rgba(80,220,210,0)');
      ctx.globalAlpha=1; ctx.fillStyle=gc2;
      ctx.beginPath(); ctx.arc(Math.cos(a)*r+drift,Math.sin(a)*r,8+c*6,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=c*0.25; ctx.strokeStyle='#88dddd'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(0,0,28+c*10,0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0;

  } else if (selectedBird===7) {
    // Mitsuri — spinning petal ring + heart glow
    ctx.shadowColor='#ff66aa'; ctx.shadowBlur=18*c;
    const gc3=ctx.createRadialGradient(0,0,12,0,0,30+c*14);
    gc3.addColorStop(0,'rgba(255,100,180,0)'); gc3.addColorStop(0.5,`rgba(255,100,180,${c*0.28})`); gc3.addColorStop(1,'rgba(255,100,180,0)');
    ctx.globalAlpha=1; ctx.fillStyle=gc3; ctx.beginPath(); ctx.arc(0,0,30+c*14,0,Math.PI*2); ctx.fill();
    for (let i=0;i<8;i++){
      const a=t*4+i*Math.PI*2/8, r=22+c*10;
      ctx.save(); ctx.translate(Math.cos(a)*r,Math.sin(a)*r); ctx.rotate(a+t*2);
      ctx.globalAlpha=c*0.8; ctx.fillStyle=i%2===0?'#ff88cc':'#ffccee';
      ctx.beginPath(); ctx.ellipse(0,0,3+c*2,1.5+c,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
    ctx.shadowBlur=0;

  } else if (selectedBird===8) {
    // Giyu — deep navy water vortex (calmer, heavier than Tanjiro)
    ctx.shadowColor='#1155cc'; ctx.shadowBlur=18*c;
    const gc=ctx.createRadialGradient(0,0,16,0,0,30+c*14);
    gc.addColorStop(0,'rgba(30,100,200,0)'); gc.addColorStop(0.5,`rgba(30,100,200,${c*0.30})`); gc.addColorStop(1,'rgba(30,100,200,0)');
    ctx.globalAlpha=1; ctx.fillStyle=gc; ctx.beginPath(); ctx.arc(0,0,30+c*14,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=`rgba(60,130,220,${c*0.7})`; ctx.lineWidth=2.5;
    ctx.beginPath();
    for (let a=0;a<Math.PI*3.5*c;a+=0.14){
      const r=(8+a*5)*Math.min(1,c*1.4), px=Math.cos(a-t*2.5)*r, py=Math.sin(a-t*2.5)*r;
      a<0.14?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.stroke();
    for (let i=0;i<4;i++){
      const a=t*3+i*Math.PI/2, r=22+c*12;
      ctx.globalAlpha=c*0.75; ctx.fillStyle='#4488ff';
      ctx.beginPath(); ctx.arc(Math.cos(a)*r,Math.sin(a)*r,3+c*2,0,Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur=0;

  } else if (selectedBird===9) {
    // Gyomei — earth tremor, rumbling stone shards orbit
    ctx.shadowColor='#aa7722'; ctx.shadowBlur=18*c;
    const gc2=ctx.createRadialGradient(0,0,14,0,0,32+c*12);
    gc2.addColorStop(0,'rgba(180,140,80,0)'); gc2.addColorStop(0.5,`rgba(180,140,80,${c*0.28})`); gc2.addColorStop(1,'rgba(180,140,80,0)');
    ctx.globalAlpha=1; ctx.fillStyle=gc2; ctx.beginPath(); ctx.arc(0,0,32+c*12,0,Math.PI*2); ctx.fill();
    for (let i=0;i<5;i++){
      const a=t*2+i*Math.PI*2/5, r=22+c*10;
      ctx.globalAlpha=c*0.8; ctx.fillStyle=i%2===0?'#bb9955':'#887744';
      const s=3+c*2.5;
      ctx.save(); ctx.translate(Math.cos(a)*r,Math.sin(a)*r); ctx.rotate(a*2);
      ctx.beginPath(); ctx.rect(-s/2,-s*0.4,s,s*0.8); ctx.fill();
      ctx.restore();
    }
    ctx.shadowBlur=0;

  } else if (selectedBird===10) {
    // Sanemi — violent wind gusts, sharp crescent arcs
    ctx.shadowColor='#88ffcc'; ctx.shadowBlur=16*c;
    for (let i=0;i<6;i++){
      const a=t*6+i*Math.PI*2/6, r=20+c*12;
      ctx.globalAlpha=c*(0.5+Math.sin(t*5+i)*0.25); ctx.strokeStyle='rgba(150,255,200,0.9)'; ctx.lineWidth=2.5; ctx.lineCap='round';
      ctx.beginPath(); ctx.arc(0,0,r,a,a+0.75); ctx.stroke();
      ctx.globalAlpha=c*0.7; ctx.fillStyle='rgba(200,255,220,0.8)';
      ctx.beginPath(); ctx.arc(Math.cos(a+0.75)*r,Math.sin(a+0.75)*r,2+c*2,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=c*0.3; ctx.strokeStyle='#aaffdd'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(0,0,30+c*8,0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0;

  } else {
    // Obanai — coiling serpent glow rings
    ctx.shadowColor='#22cc66'; ctx.shadowBlur=16*c;
    // coiling helix rings
    ctx.strokeStyle=`rgba(60,200,120,${c*0.75})`; ctx.lineWidth=2.5;
    ctx.beginPath();
    for (let a=0;a<Math.PI*3*c;a+=0.10){
      const r=(10+a*4.5)*Math.min(1,c*1.5), px=Math.cos(a+t*2)*r, py=Math.sin(a+t*2)*r*0.7;
      a<0.10?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.stroke();
    for (let i=0;i<4;i++){
      const a=t*3.5+i*Math.PI/2, r=22+c*10;
      ctx.globalAlpha=c*0.8; ctx.fillStyle='rgba(60,200,120,0.9)';
      ctx.beginPath(); ctx.arc(Math.cos(a)*r,Math.sin(a)*r,2.5+c*2,0,Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur=0;
  }

  // Charge arc ring around bird
  ctx.globalAlpha=0.85;
  ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=3.5;
  ctx.beginPath(); ctx.arc(0,0,36,-Math.PI/2,-Math.PI/2+Math.PI*2); ctx.stroke();
  ctx.strokeStyle=SLASH_FLASH[selectedBird]; ctx.shadowColor=SLASH_FLASH[selectedBird]; ctx.shadowBlur=10;
  ctx.lineWidth=3.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(0,0,36,-Math.PI/2,-Math.PI/2+Math.PI*2*c); ctx.stroke();
  ctx.shadowBlur=0; ctx.restore(); ctx.globalAlpha=1;
}

function spawnSuperAttack(x, y, birdIdx) {
  superAttacks.push({ x, y, birdIdx, t:0, life:1, vx:6, hh:H*0.48, hw:100 });

function drawBreathAttacks() {
  breathAttacks.forEach(a=>{
    const al=a.life, p=a.power, t=a.t;
    ctx.save(); ctx.translate(a.x, a.y);

    if (a.birdIdx===0) {
      // Tanjiro — sinusoidal water streams fanning out (Water Constant Flux)
      ctx.shadowColor='#22aaff'; ctx.shadowBlur=22;
      for (let j=0;j<6;j++){
        const yOff=(j-2.5)*20*p, amp=10+p*14;

  ctx.globalAlpha=1;
}

function drawSuperAttacks() {
  superAttacks.forEach(a=>{
    const al=a.life, t=a.t, R=H*0.24; // half-height radius
    ctx.save(); ctx.translate(a.x, a.y);

    if (a.birdIdx===0) {
      // ── Tanjiro: Total Concentration — Raging Torrent ──
      // Massive water-dragon backdrop glow
      ctx.shadowColor='#00aaff'; ctx.shadowBlur=60;
      const bg=ctx.createRadialGradient(0,0,0,0,0,R*1.3);
      bg.addColorStop(0,`rgba(100,220,255,${al*0.18})`); bg.addColorStop(1,'rgba(0,100,255,0)');
      ctx.globalAlpha=al; ctx.fillStyle=bg;
      ctx.beginPath(); ctx.ellipse(R,0,R*1.4,R*1.1,0,0,Math.PI*2); ctx.fill();
      // 18 sinusoidal streams spanning full H*0.5
      for(let j=0;j<18;j++){
        const yOff=(j/(17))*(R*2)-R, amp=18+Math.sin(j)*10;
        const g=ctx.createLinearGradient(0,yOff,W,yOff);
        g.addColorStop(0,`rgba(180,240,255,${al})`);
        g.addColorStop(0.5,`rgba(60,160,255,${al*0.8})`);

      ctx.shadowColor='#88ffcc'; ctx.shadowBlur=60;
      const bg2=ctx.createRadialGradient(0,0,0,0,0,R*1.4);
      bg2.addColorStop(0,`rgba(150,255,200,${al*0.2})`); bg2.addColorStop(1,'rgba(80,200,140,0)');
      ctx.globalAlpha=al; ctx.fillStyle=bg2;
      ctx.beginPath(); ctx.ellipse(R*0.8,0,R*1.4,R*1.1,0,0,Math.PI*2); ctx.fill();
      // tornado spiral of wind blades
      const blades=16;
      for (let j=0;j<blades;j++){
        const ang=(j/blades)*Math.PI*2+t*0.08, len=R*(0.55+Math.cos(ang)*0.22);
        ctx.save(); ctx.rotate(ang);
        const g=ctx.createLinearGradient(0,0,len,0);
        g.addColorStop(0,`rgba(180,255,220,${al})`);
        g.addColorStop(0.6,`rgba(100,220,160,${al*0.7})`);
        g.addColorStop(1,'rgba(80,200,140,0)');
        ctx.strokeStyle=g; ctx.lineWidth=j%3===0?5:2.5; ctx.lineCap='round';
        ctx.globalAlpha=al*(0.8+Math.sin(t*0.1+j)*0.15);
        ctx.beginPath();
        for (let x2=0;x2<=len;x2+=5){
          const y2=Math.sin(x2*0.11+t*0.3+j*0.4)*(5-Math.abs(j/blades-0.5)*6);
          x2===0?ctx.moveTo(x2,y2):ctx.lineTo(x2,y2);
        }
        ctx.stroke();
        ctx.restore();
      }
      // outer wind rings
      for (let r=0;r<4;r++){
        const rad=40+r*30+t*2, rAl=al*Math.max(0,1-rad/(R*2.2));
        ctx.globalAlpha=rAl*0.55; ctx.strokeStyle=`rgba(150,255,200,${rAl})`;
        ctx.lineWidth=2.5; ctx.beginPath(); ctx.arc(0,0,rad,0,Math.PI*2); ctx.stroke();
      }
      ctx.globalAlpha=al*0.85; ctx.textAlign='center';
      ctx.font=`bold ${Math.round(R*0.45)}px Arial`; ctx.fillStyle=`rgba(180,255,220,${al})`;
      ctx.shadowColor='#88ffcc'; ctx.shadowBlur=30;
      ctx.fillText('風', 20, 14);

    } else {
      // ── Obanai: Serpent Breathing — Coiling Serpent Slash ──
      ctx.shadowColor='#22cc66'; ctx.shadowBlur=60;
      const bg3=ctx.createRadialGradient(0,0,0,0,0,R*1.3);
      bg3.addColorStop(0,`rgba(60,200,120,${al*0.2})`); bg3.addColorStop(1,'rgba(20,130,70,0)');
      ctx.globalAlpha=al; ctx.fillStyle=bg3;
      ctx.beginPath(); ctx.ellipse(R*0.75,0,R*1.3,R,0,0,Math.PI*2); ctx.fill();
      // massive serpent coil spanning full half-height — multiple interlocking S-curves
      for (let j=0;j<5;j++){
        const yOff=(j/4)*(R*2)-R, amp=22+j*4;
        const g=ctx.createLinearGradient(0,yOff,W,yOff);
        g.addColorStop(0,`rgba(80,220,140,${al})`);
        g.addColorStop(0.5,`rgba(40,180,100,${al*0.75})`);
        g.addColorStop(1,'rgba(20,150,70,0)');
        ctx.strokeStyle=g; ctx.lineWidth=j===2?8:5; ctx.lineCap='round';
        ctx.globalAlpha=al*(0.85+j*0.02);
        ctx.beginPath();
        for (let x2=0;x2<=W;x2+=5){
          const y2=yOff+Math.sin(x2*0.07+t*0.2+j*0.7)*amp;
          x2===0?ctx.moveTo(x2,y2):ctx.lineTo(x2,y2);
        }
        ctx.stroke();
      }
      // glowing serpent eyes along the path
      for (let i=0;i<6;i++){
        const ex=40+i*R*0.3, ey=Math.sin(ex*0.07+t*0.2)*22;
        ctx.globalAlpha=al*(0.7+Math.sin(t*0.15+i)*0.2);
        ctx.fillStyle='rgba(80,230,140,0.9)';
        ctx.beginPath(); ctx.arc(ex,ey,4,0,Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha=al*0.85; ctx.textAlign='center';
      ctx.font=`bold ${Math.round(R*0.45)}px Arial`; ctx.fillStyle=`rgba(100,230,160,${al})`;
      ctx.shadowColor='#22cc66'; ctx.shadowBlur=30;
      ctx.fillText('蛇', 20, 14);
    }

    // Super technique label — large and prominent
    if(al>0.5){
      const la=(al-0.5)/0.5;
      ctx.globalAlpha=la; ctx.textAlign='left'; ctx.shadowColor=SLASH_FLASH[a.birdIdx]; ctx.shadowBlur=18;
      ctx.font=`bold ${18}px Arial`; ctx.fillStyle='#ffffff';
      ctx.fillText(`★ ${SUPER_FORMS[a.birdIdx]}`,10,-R-8);
      ctx.font='13px Arial'; ctx.fillStyle=SLASH_FLASH[a.birdIdx];
      ctx.fillText(SLASH_NAMES[a.birdIdx],10,-R+12);
      ctx.shadowBlur=0;
    }
    ctx.restore();
  });
  ctx.globalAlpha=1;
}

function drawSlashEffects() {
  slashEffects.forEach(s=>{
    s.t++; s.life -= 0.033;
    if (s.life <= 0) return;
    const a=s.life;
    ctx.save(); ctx.translate(s.x, s.y);

    if (s.birdIdx===0) {
      // ── Tanjiro · Water Breathing ─ expanding ripple rings + radial streams
      for (let i=0;i<3;i++) {
        const r=((1-a)*70)+i*16;
        ctx.globalAlpha=a*(0.85-i*0.22); ctx.strokeStyle='#55ccff'; ctx.lineWidth=2.5-i*0.5;
        ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
      }
      ctx.globalAlpha=a*0.9;
      for (let i=0;i<10;i++) {
        const ang=(i/10)*Math.PI*2, len=((1-a)*55)+12;
        const g=ctx.createLinearGradient(0,0,Math.cos(ang)*len,Math.sin(ang)*len);
        g.addColorStop(0,'rgba(120,220,255,0.9)'); g.addColorStop(1,'rgba(80,180,255,0)');
        ctx.strokeStyle=g; ctx.lineWidth=2; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(Math.cos(ang)*8,Math.sin(ang)*8);
        ctx.lineTo(Math.cos(ang)*len,Math.sin(ang)*len); ctx.stroke();
      }

    } else if (s.birdIdx===1) {
      // ── Zenitsu · Thunder Breathing ─ radiating zigzag lightning bolts
      ctx.shadowColor='#ffee00'; ctx.shadowBlur=18;
      const flash=(1-a)*48+6;
      const fg=ctx.createRadialGradient(0,0,0,0,0,flash);
      fg.addColorStop(0,`rgba(255,255,200,${a})`); fg.addColorStop(0.5,`rgba(255,220,0,${a*0.5})`); fg.addColorStop(1,'rgba(255,180,0,0)');
      ctx.globalAlpha=a; ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(0,0,flash,0,Math.PI*2); ctx.fill();
      for (let i=0;i<7;i++) {
        const ang=(i/7)*Math.PI*2, len=((1-a)*62)+14;
        ctx.globalAlpha=a*0.95; ctx.strokeStyle='rgba(255,238,0,0.95)'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(0,0);
        const mx=Math.cos(ang)*len*0.4+(Math.random()-0.5)*10, my=Math.sin(ang)*len*0.4+(Math.random()-0.5)*10;
        const mx2=Math.cos(ang)*len*0.75+(Math.random()-0.5)*10, my2=Math.sin(ang)*len*0.75+(Math.random()-0.5)*10;
        ctx.lineTo(mx,my); ctx.lineTo(mx2,my2); ctx.lineTo(Math.cos(ang)*len,Math.sin(ang)*len);
        ctx.stroke();
      }
      ctx.shadowBlur=0;

    } else if (s.birdIdx===2) {
      // ── Inosuke · Beast Breathing ─ three expanding claw slashes + wind rings
      ctx.globalAlpha=a*0.85;
      const spread=((1-a)*60)+10;
      [-18,0,18].forEach(off=>{
        const g=ctx.createLinearGradient(-spread,off-spread,spread,off+spread);
        g.addColorStop(0,'rgba(85,255,170,0)'); g.addColorStop(0.3,`rgba(85,255,170,${a*0.9})`); g.addColorStop(1,'rgba(85,255,170,0)');
        ctx.strokeStyle=g; ctx.lineWidth=3; ctx.lineCap='round';
        ctx.beginPath();
        ctx.moveTo(-spread*0.6+off*0.3, -spread*0.7+off*0.2);
        ctx.quadraticCurveTo(off*0.5, off*0.3, spread*0.6+off*0.3, spread*0.5+off*0.2);
        ctx.stroke();
      });
      for (let i=0;i<3;i++) {
        const r=((1-a)*45)+i*14;
        ctx.globalAlpha=a*(0.5-i*0.12); ctx.strokeStyle='#55ffaa'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
      }

    } else if (s.birdIdx===3) {
      // ── Rengoku · Flame Breathing ─ radial flame burst + expanding fire ring
      ctx.shadowColor='#ff4400'; ctx.shadowBlur=22;
      const fr=((1-a)*58)+8;
      const fg=ctx.createRadialGradient(0,0,0,0,0,fr);
      fg.addColorStop(0,`rgba(255,255,180,${a})`); fg.addColorStop(0.35,`rgba(255,130,0,${a*0.85})`); fg.addColorStop(1,'rgba(255,40,0,0)');
      ctx.globalAlpha=a; ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(0,0,fr,0,Math.PI*2); ctx.fill();
      for (let i=0;i<9;i++) {
        const ang=(i/9)*Math.PI*2, flen=((1-a)*68)+16, flick=1+Math.sin(s.t*0.4+i)*0.25;
        const fg2=ctx.createLinearGradient(0,0,Math.cos(ang)*flen*flick,Math.sin(ang)*flen*flick);
        fg2.addColorStop(0,'rgba(255,220,80,0.95)'); fg2.addColorStop(1,'rgba(255,50,0,0)');
        ctx.globalAlpha=a*0.9; ctx.strokeStyle=fg2; ctx.lineWidth=3.5; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(Math.cos(ang)*fr*0.35,Math.sin(ang)*fr*0.35);
        ctx.lineTo(Math.cos(ang)*flen*flick,Math.sin(ang)*flen*flick); ctx.stroke();
      }
      ctx.shadowBlur=0;

    } else if (s.birdIdx===4) {
      // ── Shinobu · Insect Breathing ─ purple petal burst + toxic ring
      ctx.shadowColor='#cc44ff'; ctx.shadowBlur=16;
      const pr=((1-a)*55)+8;
      const pg=ctx.createRadialGradient(0,0,0,0,0,pr);
      pg.addColorStop(0,`rgba(220,120,255,${a*0.85})`); pg.addColorStop(1,'rgba(160,40,220,0)');
      ctx.globalAlpha=a; ctx.fillStyle=pg; ctx.beginPath(); ctx.arc(0,0,pr,0,Math.PI*2); ctx.fill();
      for (let i=0;i<8;i++){
        const ang=(i/8)*Math.PI*2, len=((1-a)*60)+12;
        const g=ctx.createLinearGradient(0,0,Math.cos(ang)*len,Math.sin(ang)*len);
        g.addColorStop(0,'rgba(220,100,255,0.9)'); g.addColorStop(1,'rgba(200,80,255,0)');
        ctx.strokeStyle=g; ctx.lineWidth=2.2; ctx.lineCap='round';
        ctx.globalAlpha=a*0.9;
        ctx.beginPath();
        ctx.moveTo(Math.cos(ang)*pr*0.3,Math.sin(ang)*pr*0.3);
        ctx.lineTo(Math.cos(ang)*len, Math.sin(ang)*len); ctx.stroke();
      }
      // toxic ring
      const tr=((1-a)*48)+6;
      ctx.globalAlpha=a*0.5; ctx.strokeStyle='rgba(180,80,255,0.8)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(0,0,tr,0,Math.PI*2); ctx.stroke();
      ctx.shadowBlur=0;

    } else if (s.birdIdx===5) {
      // ── Tengen · Sound Breathing ─ concentric sound rings + gem flash
      ctx.shadowColor='#ffd000'; ctx.shadowBlur=18;
      for (let i=0;i<4;i++){
        const sr=((1-a)*65)+i*14+6;
        ctx.globalAlpha=a*(0.75-i*0.15); ctx.strokeStyle=i%2===0?'rgba(255,220,60,0.9)':'rgba(255,150,30,0.7)'; ctx.lineWidth=2.5-i*0.4;
        ctx.beginPath(); ctx.arc(0,0,sr,0,Math.PI*2); ctx.stroke();
      }
      for (let i=0;i<6;i++){
        const ang=(i/6)*Math.PI*2, len=((1-a)*58)+14;
        ctx.globalAlpha=a*0.85; ctx.strokeStyle='rgba(255,215,60,0.9)'; ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(ang)*len,Math.sin(ang)*len); ctx.stroke();
      }
      ctx.shadowBlur=0;

    } else if (s.birdIdx===6) {
      // ── Muichiro · Mist Breathing ─ drifting mist puffs + rings
      ctx.shadowColor='#44ddcc'; ctx.shadowBlur=14;
      for (let i=0;i<5;i++){
        const mr=((1-a)*50)+i*10+5;
        ctx.globalAlpha=a*(0.3-i*0.04);
        const mg=ctx.createRadialGradient(0,0,0,0,0,mr);
        mg.addColorStop(0,`rgba(120,240,230,${a*0.5})`); mg.addColorStop(1,'rgba(80,180,180,0)');
        ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(0,0,mr,0,Math.PI*2); ctx.fill();
      }
      for (let i=0;i<6;i++){
        const ang=(i/6)*Math.PI*2, len=((1-a)*55)+12;
        const g=ctx.createLinearGradient(0,0,Math.cos(ang)*len,Math.sin(ang)*len);
        g.addColorStop(0,'rgba(80,220,210,0.85)'); g.addColorStop(1,'rgba(80,220,210,0)');
        ctx.strokeStyle=g; ctx.lineWidth=2.8; ctx.lineCap='round';
        ctx.globalAlpha=a*0.8;
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(ang)*len,Math.sin(ang)*len); ctx.stroke();
      }
      ctx.shadowBlur=0;

    } else if (s.birdIdx===7) {
      // ── Mitsuri · Love Breathing ─ ribbon burst + heart sparks
      ctx.shadowColor='#ff44aa'; ctx.shadowBlur=18;
      const lr=((1-a)*52)+8;
      const lg=ctx.createRadialGradient(0,0,0,0,0,lr);
      lg.addColorStop(0,`rgba(255,120,190,${a*0.85})`); lg.addColorStop(1,'rgba(255,60,130,0)');
      ctx.globalAlpha=a; ctx.fillStyle=lg; ctx.beginPath(); ctx.arc(0,0,lr,0,Math.PI*2); ctx.fill();
      const lColors=['rgba(255,100,170,','rgba(80,200,100,'];
      for (let i=0;i<8;i++){
        const ang=(i/8)*Math.PI*2, len=((1-a)*62)+14;
        const col=lColors[i%2];
        const g=ctx.createLinearGradient(0,0,Math.cos(ang)*len,Math.sin(ang)*len);
        g.addColorStop(0,`${col}0.9)`); g.addColorStop(1,`${col}0)`);
        ctx.strokeStyle=g; ctx.lineWidth=3; ctx.lineCap='round';
        ctx.globalAlpha=a*0.9;
        ctx.beginPath(); ctx.moveTo(Math.cos(ang)*lr*0.3,Math.sin(ang)*lr*0.3);
        ctx.lineTo(Math.cos(ang)*len, Math.sin(ang)*len); ctx.stroke();
      }
      ctx.shadowBlur=0;

    } else if (s.birdIdx===8) {
      // ── Giyu · Water Breathing ─ concentric still-water rings
      ctx.shadowColor='#1155cc'; ctx.shadowBlur=16;
      for (let i=0;i<3;i++){
        const r=((1-a)*65)+i*16+6;
        ctx.globalAlpha=a*(0.75-i*0.18); ctx.strokeStyle=`rgba(60,130,220,${a*(0.8-i*0.15)})`; ctx.lineWidth=2.5-i*0.4;
        ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
      }
      for (let i=0;i<8;i++){
        const ang=(i/8)*Math.PI*2, len=((1-a)*58)+12;
        const g=ctx.createLinearGradient(0,0,Math.cos(ang)*len,Math.sin(ang)*len);
        g.addColorStop(0,'rgba(80,150,255,0.9)'); g.addColorStop(1,'rgba(40,100,220,0)');
        ctx.strokeStyle=g; ctx.lineWidth=2.2; ctx.lineCap='round';
        ctx.globalAlpha=a*0.88;
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(ang)*len,Math.sin(ang)*len); ctx.stroke();
      }
      ctx.shadowBlur=0;

    } else if (s.birdIdx===9) {
      // ── Gyomei · Stone Breathing ─ stone-shard burst + earth ring
      ctx.shadowColor='#aa7722'; ctx.shadowBlur=16;
      const er=((1-a)*52)+8;
      const eg=ctx.createRadialGradient(0,0,0,0,0,er);
      eg.addColorStop(0,`rgba(210,170,80,${a*0.8})`); eg.addColorStop(1,'rgba(150,100,30,0)');
      ctx.globalAlpha=a; ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(0,0,er,0,Math.PI*2); ctx.fill();
      for (let i=0;i<6;i++){
        const ang=(i/6)*Math.PI*2, len=((1-a)*60)+14;
        ctx.globalAlpha=a*0.85; ctx.fillStyle='rgba(190,150,60,0.9)';
        ctx.save(); ctx.translate(Math.cos(ang)*len,Math.sin(ang)*len); ctx.rotate(ang);
        ctx.beginPath(); ctx.rect(-4,-2.5,8,5); ctx.fill();
        ctx.restore();
      }
      ctx.globalAlpha=a*0.5; ctx.strokeStyle='rgba(200,160,70,0.8)'; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.arc(0,0,er*1.3,0,Math.PI*2); ctx.stroke();
      ctx.shadowBlur=0;

    } else if (s.birdIdx===10) {
      // ── Sanemi · Wind Breathing ─ crescent wind arcs + ring
      ctx.shadowColor='#88ffcc'; ctx.shadowBlur=14;
      const wr=((1-a)*50)+8;
      const wg=ctx.createRadialGradient(0,0,0,0,0,wr);
      wg.addColorStop(0,`rgba(180,255,220,${a*0.7})`); wg.addColorStop(1,'rgba(100,220,160,0)');
      ctx.globalAlpha=a; ctx.fillStyle=wg; ctx.beginPath(); ctx.arc(0,0,wr,0,Math.PI*2); ctx.fill();
      for (let i=0;i<7;i++){
        const ang=(i/7)*Math.PI*2+s.t*0.05, arcR=((1-a)*55)+14;
        ctx.globalAlpha=a*0.85; ctx.strokeStyle='rgba(150,255,200,0.9)'; ctx.lineWidth=2.5; ctx.lineCap='round';
        ctx.beginPath(); ctx.arc(0,0,arcR,ang,ang+0.7); ctx.stroke();
      }
      ctx.shadowBlur=0;

    } else {
      // ── Obanai · Serpent Breathing ─ serpent-coil burst
      ctx.shadowColor='#22cc66'; ctx.shadowBlur=14;
      const sr2=((1-a)*50)+8;
      const sg2=ctx.createRadialGradient(0,0,0,0,0,sr2);
      sg2.addColorStop(0,`rgba(80,220,140,${a*0.8})`); sg2.addColorStop(1,'rgba(30,160,80,0)');
      ctx.globalAlpha=a; ctx.fillStyle=sg2; ctx.beginPath(); ctx.arc(0,0,sr2,0,Math.PI*2); ctx.fill();
      // serpentine radial strokes
      for (let i=0;i<6;i++){
        const ang=(i/6)*Math.PI*2, len=((1-a)*58)+14;
        const g=ctx.createLinearGradient(0,0,Math.cos(ang)*len,Math.sin(ang)*len);
        g.addColorStop(0,'rgba(60,200,120,0.9)'); g.addColorStop(1,'rgba(30,150,80,0)');
        ctx.strokeStyle=g; ctx.lineWidth=3; ctx.lineCap='round';
        ctx.globalAlpha=a*0.88;
        ctx.beginPath();
        for (let x2=0;x2<=len;x2+=5){
          const y2=Math.sin(x2*0.18+s.t*0.3)*(4+x2*0.04);
          const nx=x2*Math.cos(ang)-y2*Math.sin(ang), ny=x2*Math.sin(ang)+y2*Math.cos(ang);
          x2===0?ctx.moveTo(nx,ny):ctx.lineTo(nx,ny);
        }
        ctx.stroke();
      }
      ctx.shadowBlur=0;
    }

    // Technique name label (fades out in first half)
    if (a > 0.5) {
      const ta=(a-0.5)*2;
      ctx.globalAlpha=ta; ctx.textAlign='center';
      ctx.font='bold 13px Arial';
      ctx.fillStyle=SLASH_FLASH[s.birdIdx];
      ctx.shadowColor=SLASH_FLASH[s.birdIdx]; ctx.shadowBlur=10;
      ctx.fillText(SLASH_LABELS[s.birdIdx], 0, -62);
      ctx.font='11px Arial'; ctx.fillStyle='rgba(255,255,255,0.85)';
      ctx.fillText(SLASH_NAMES[s.birdIdx], 0, -46);
      ctx.shadowBlur=0;
    }
    // +5 score pop
    if (a > 0.6) {
      ctx.globalAlpha=(a-0.6)/0.4; ctx.font='bold 16px Arial';
      ctx.fillStyle='#ffd700'; ctx.textAlign='center';
      ctx.fillText('+5', 0, -80+(1-a)*30);
    }

    ctx.restore();
  });
  slashEffects = slashEffects.filter(s=>s.life>0);
  ctx.globalAlpha=1;
}

function jump() {
  if (gameState==='waiting') { gameState='playing'; bird.vy=JUMP; startMusic(); playJump(); return; }
  if (gameState!=='playing') return;
  // If already ascending, boost further instead of resetting — rapid taps climb faster
  if (bird.vy < 0) bird.vy = Math.max(bird.vy - 4.5, -20);
  else             bird.vy = JUMP;
  playJump();
}

function emitTrail(def) {
  if (gameState!=='playing') return;
  const b=selectedBird;
  if (b===0) { // Tanjiro — water droplets + ripples
    if (Math.random()>0.55) return;
    particles.push({ x:bird.x-bird.radius+Math.random()*6, y:bird.y+(Math.random()-0.5)*14,
      vx:-1.2-Math.random()*2, vy:(Math.random()-0.5)*1.2+0.3,
      life:1, color:Math.random()>0.4?def.trail1:def.trail2,
      size:2.5+Math.random()*3.5, type:'water' });
    if (Math.random()<0.22) particles.push({ x:bird.x-bird.radius, y:bird.y,
      vx:-0.4, vy:0, life:1, color:def.trail1, size:3, type:'ripple', maxSize:16+Math.random()*10 });
  } else if (b===1) { // Zenitsu — electric sparks + zigzag bolts
    if (Math.random()>0.65) return;
    particles.push({ x:bird.x-bird.radius, y:bird.y+(Math.random()-0.5)*10,
      vx:-3-Math.random()*4, vy:(Math.random()-0.5)*3,
      life:1, color:Math.random()>0.3?def.trail1:def.trail2,
      size:1.5+Math.random()*2.5, type:'spark' });

function updateParticles() {
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if      (p.type==='fire')      { p.vy-=0.07; p.vx*=0.97; }
    else if (p.type==='ember')     { p.vy-=0.04; }
    else if (p.type==='water')     { p.vy+=0.06; }
    else if (p.type==='ripple')    { /* expands */ }
    else if (p.type==='soundring') { /* expands */ }
    else if (p.type==='butterfly') { p.vy+=Math.sin(p.life*8)*0.08; }
    else if (p.type==='mist')      { p.vx*=0.96; p.vy*=0.96; }
    else if (p.type==='petal')     { p.vy+=0.04; p.angle=(p.angle||0)+0.12; }
    else if (p.type==='stone')     { p.vy+=0.12; p.vx*=0.95; }
    else if (p.type==='serpent')   { p.vy+=Math.sin(p.life*6)*0.1; }
    else                           { p.vy+=0.05; }
    const decay = p.type==='bolt'?0.10 : p.type==='spark'?0.07 : p.type==='ripple'?0.028 : p.type==='soundring'?0.032 : p.type==='mist'?0.022 : p.type==='stone'?0.055 : 0.045;
    p.life-=decay;
  });
  particles=particles.filter(p=>p.life>0);
}
function drawParticles() {
  particles.forEach(p=>{
    ctx.save();
    if (p.type==='water') {
      ctx.globalAlpha=p.life*0.8;
      ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(200,240,255,0.55)';
      ctx.beginPath(); ctx.arc(p.x-p.size*p.life*0.3,p.y-p.size*p.life*0.3,p.size*p.life*0.35,0,Math.PI*2); ctx.fill();
    } else if (p.type==='ripple') {
      const r=p.maxSize*(1-p.life);
      ctx.globalAlpha=p.life*0.5; ctx.strokeStyle=p.color; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.stroke();
    } else if (p.type==='spark') {
      ctx.globalAlpha=p.life*0.95;
      ctx.shadowColor=p.color; ctx.shadowBlur=6;
      ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ffffff';
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life*0.4,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    } else if (p.type==='bolt') {
      ctx.globalAlpha=p.life*0.9;
      ctx.strokeStyle='#ffee00'; ctx.lineWidth=2;
      ctx.shadowColor='#ffee00'; ctx.shadowBlur=8;
      const len=p.length*p.life;
      ctx.beginPath();
      ctx.moveTo(p.x,p.y);
      ctx.lineTo(p.x-len*0.3, p.y-4+Math.sin(p.life*10)*3);
      ctx.lineTo(p.x-len*0.55,p.y+3);
      ctx.lineTo(p.x-len*0.75,p.y-3+Math.sin(p.life*8)*2);
      ctx.lineTo(p.x-len,     p.y+1);
      ctx.stroke(); ctx.shadowBlur=0;
    } else if (p.type==='wind') {
      ctx.globalAlpha=p.life*0.65;
      ctx.strokeStyle=p.color; ctx.lineWidth=1.8+p.size*0.15; ctx.lineCap='round';
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life*1.8,p.angle,p.angle+p.sweep*p.life); ctx.stroke();
    } else if (p.type==='fire') {
      if (p.flicker!==undefined) p.flicker+=0.25;
      const rs=p.size*p.life*(1+Math.sin(p.flicker||0)*0.25);
      ctx.globalAlpha=p.life*0.85;
      const fg=ctx.createRadialGradient(p.x,p.y-rs*0.3,0,p.x,p.y,rs);
      fg.addColorStop(0,'rgba(255,247,160,0.9)'); fg.addColorStop(0.4,p.color); fg.addColorStop(1,'rgba(255,60,0,0)');
      ctx.fillStyle=fg;
      ctx.beginPath(); ctx.arc(p.x,p.y,rs,0,Math.PI*2); ctx.fill();
    } else if (p.type==='ember') {
      ctx.globalAlpha=p.life*0.9;
      ctx.shadowColor=p.color; ctx.shadowBlur=4;
      ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    } else if (p.type==='butterfly') {
      ctx.globalAlpha=p.life*0.8;
      ctx.fillStyle=p.color;
      const r=p.size*p.life;
      // two wing-lobes
      ctx.beginPath(); ctx.ellipse(p.x-r*0.4,p.y,r*0.9,r*0.55,Math.PI*0.25,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(p.x+r*0.4,p.y,r*0.9,r*0.55,-Math.PI*0.25,0,Math.PI*2); ctx.fill();
    } else if (p.type==='soundring') {
      const r=p.maxSize*(1-p.life);
      ctx.globalAlpha=p.life*0.55; ctx.strokeStyle=p.color; ctx.lineWidth=1.8;
      ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.stroke();
    } else if (p.type==='mist') {
      ctx.globalAlpha=p.life*0.35;
      const rg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*p.life);
      rg.addColorStop(0,p.color); rg.addColorStop(1,'rgba(200,255,255,0)');
      ctx.fillStyle=rg;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill();
    } else if (p.type==='petal') {
      ctx.globalAlpha=p.life*0.8;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.angle||0);
      ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.ellipse(0,0,p.size*p.life*1.2,p.size*p.life*0.6,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    } else if (p.type==='stone') {
      ctx.globalAlpha=p.life*0.85;
      ctx.fillStyle=p.color;
      const s=p.size*p.life;
      ctx.beginPath(); ctx.rect(p.x-s*0.5,p.y-s*0.4,s,s*0.8); ctx.fill();
      ctx.fillStyle='rgba(220,200,170,0.4)';
      ctx.beginPath(); ctx.rect(p.x-s*0.5,p.y-s*0.4,s*0.4,s*0.3); ctx.fill();
    } else if (p.type==='serpent') {
      ctx.globalAlpha=p.life*0.8;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.angle||0);
      ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.ellipse(0,0,p.size*p.life*1.4,p.size*p.life*0.5,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    } else {
      ctx.globalAlpha=p.life*0.75;
      ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  });
  ctx.globalAlpha=1;
}

// ────────────────────────────────────────────────
//  Layout rects
// ────────────────────────────────────────────────
function getSizeRect(i)  { const sw=90,sh=36,gap=10,tot=3*sw+2*gap; return {x:(W-tot)/2+i*(sw+gap),y:H*0.20,w:sw,h:sh}; }
function getBirdRect(i)  {
  const cols=4;
  const bw=Math.min(145,(W-40)/cols), bh=Math.min(88,bw*0.68);
  const row=Math.floor(i/cols), col=i%cols;
  const gapY=6;
  return {x:(W-bw*cols)/2+col*bw, y:H*0.24+row*(bh+gapY), w:bw, h:bh};
}
function getBirdGridBottom() {
  const bw=Math.min(145,(W-40)/4), bh=Math.min(88,bw*0.68);
  return H*0.24 + 3*(bh+6);
}
function getDiffRect(i)  { const gb=getBirdGridBottom(), dw=Math.min(108,(W-60)/3-8),dh=38,gap=Math.min(12,(W-3*dw-40)/2),tot=3*dw+2*gap; return {x:(W-tot)/2+i*(dw+gap),y:gb+18,w:dw,h:dh}; }
function getPlayRect()   { const gb=getBirdGridBottom(); return {x:W/2-165,y:gb+70,w:150,h:46}; }
function getLeadRect()   { const gb=getBirdGridBottom(); return {x:W/2+15, y:gb+70,w:150,h:46}; }
function getDemoRect()   { const gb=getBirdGridBottom(); return {x:W/2-80, y:gb+124,w:160,h:32}; }
function inRect(mx,my,r) { return mx>r.x&&mx<r.x+r.w&&my>r.y&&my<r.y+r.h; }

// ────────────────────────────────────────────────
//  Input
// ────────────────────────────────────────────────
let hoverBird=-1, hoverDiff='', hoverSize='';

function getMouse(e){ const r=canvas.getBoundingClientRect(); return {mx:(e.clientX-r.left)*(W/r.width),my:(e.clientY-r.top)*(H/r.height)}; }
function getTouch(e){ const r=canvas.getBoundingClientRect(),t=e.touches[0]; return {mx:(t.clientX-r.left)*(W/r.width),my:(t.clientY-r.top)*(H/r.height)}; }

canvas.addEventListener('mousemove',e=>{
  if(gameState!=='select') return;
  const {mx,my}=getMouse(e); hoverBird=-1; hoverDiff=''; hoverSize='';
  for(let i=0;i<12;i++) if(inRect(mx,my,getBirdRect(i))) hoverBird=i;
  DIFF_KEYS.forEach((k,i)=>{ if(inRect(mx,my,getDiffRect(i))) hoverDiff=k; });
  SIZE_KEYS.forEach((k,i)=>{ if(inRect(mx,my,getSizeRect(i))) hoverSize=k; });
});

function handleSelectClick(mx,my) {
  for(let i=0;i<3;i++) if(inRect(mx,my,getSizeRect(i))){ applySize(SIZE_KEYS[i]); return; }
  for(let i=0;i<12;i++) if(inRect(mx,my,getBirdRect(i))){ selectedBird=i; return; }
  DIFF_KEYS.forEach((k,i)=>{ if(inRect(mx,my,getDiffRect(i))) selectedDiff=k; });
  if(inRect(mx,my,getPlayRect())){ demoMode=false; initGame(); gameState='waiting'; startMusic(); return; }
  if(inRect(mx,my,getLeadRect())){ gameState='leaderboard'; fetchGlobalScores(); return; }
  if(inRect(mx,my,getDemoRect())){ demoMode=true; initGame(); gameState='waiting'; startMusic(); return; }
}

// ── click: menus + dead-with-score redirect only
canvas.addEventListener('click',e=>{
  if(demoMode){ demoMode=false; inputHeld=false; gameState='select'; return; }
  const {mx,my}=getMouse(e);
  if(gameState==='select')      { handleSelectClick(mx,my); return; }
  if(gameState==='leaderboard') { gameState='select'; return; }
  if(gameState==='dead')        { if(score===0) gameState='select'; return; }
});
// ── mouse: press = jump, hold = arm glide
canvas.addEventListener('mousedown',e=>{
  if(demoMode) return;
  if(gameState==='waiting') { jump(); inputHeld=true; return; }
  if(gameState==='playing') { jump(); inputHeld=true; }
});
canvas.addEventListener('mouseup', ()=>{ inputHeld=false; });

// ── touch: press = jump, hold = arm glide
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  // Secret: tap top-left corner to toggle invincible mode
  const r=canvas.getBoundingClientRect();
  const t=e.touches[0];
  const tx=(t.clientX-r.left)*(W/r.width), ty=(t.clientY-r.top)*(H/r.height);
  if(tx < W*0.30 && ty < H*0.30 && gameState==='playing') { invincible=!invincible; }
  if(demoMode){ demoMode=false; inputHeld=false; gameState='select'; return; }
  if(gameState==='select')      { const {mx,my}=getTouch(e); handleSelectClick(mx,my); return; }
  if(gameState==='leaderboard') { gameState='select'; return; }
  if(gameState==='dead')        { if(score===0) gameState='select'; return; }
  if(gameState==='waiting') { jump(); inputHeld=true; return; }
  if(gameState==='playing') { jump(); inputHeld=true; }
},{passive:false});
canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  if(e.touches.length === 0) inputHeld=false;
},{passive:false});

// ── keyboard: press = jump, hold = arm glide, release = fall
document.addEventListener('keydown',e=>{
  if(demoMode && e.code!=='Backspace'){ demoMode=false; inputHeld=false; gameState='select'; return; }
  if(e.code!=='Space') return;
  e.preventDefault();
  if(gameState==='leaderboard'||(gameState==='dead'&&score===0)){ gameState='select'; return; }
  if(gameState==='waiting') { jump(); inputHeld=true; return; }
  if(gameState==='playing') { if(!e.repeat) jump(); inputHeld=true; }
});
document.addEventListener('keyup',e=>{
  if(e.code==='Space')     inputHeld=false;
  if(e.code==='Backspace') invincible=false;
});
document.addEventListener('keydown',e=>{
  if(e.code==='Backspace') invincible=true;
});

// ────────────────────────────────────────────────
//  Draw helpers
// ────────────────────────────────────────────────
function currentSky() { return SKY_THEMES[skyTheme]||SKY_THEMES[0]; }

function drawSky() {
  const sk=currentSky();
  const g=ctx.createLinearGradient(0,0,0,H-GROUND_H);
  g.addColorStop(0,sk.top); g.addColorStop(0.5,sk.mid); g.addColorStop(1,sk.bot);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H-GROUND_H);
}

function drawStars() {
  stars.forEach(s=>{
    s.twinkle+=0.04;
    ctx.fillStyle=`rgba(255,255,200,${0.4+0.6*Math.abs(Math.sin(s.twinkle))})`;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  });
}

function drawMoon() {
  const sk=currentSky(); const mx=W*0.87, my=H*0.1;
  // glow
  const g=ctx.createRadialGradient(mx,my,5,mx,my,50);
  g.addColorStop(0,sk.moonGlow.replace('0.','0.6').replace('0.','0.9')||sk.moonGlow);
  g.addColorStop(0.4,sk.moonGlow); g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.fillRect(mx-55,my-55,110,110);
  // disc
  ctx.fillStyle=sk.moon; ctx.beginPath(); ctx.arc(mx,my,22,0,Math.PI*2); ctx.fill();
  // crescent shadow
  ctx.fillStyle=currentSky().top;
  ctx.beginPath(); ctx.arc(mx+7,my-3,17,0,Math.PI*2); ctx.fill();
}

function drawMountains() {
  const sk=currentSky();
  ctx.fillStyle=sk.top;
  ctx.globalAlpha=0.55;
  // far mountain range
  ctx.beginPath(); ctx.moveTo(0,H-GROUND_H);
  for(let x=0;x<=W;x+=W/8){
    const peakH=60+Math.sin(x*0.02)*40+Math.sin(x*0.05)*20;
    ctx.lineTo(x,H-GROUND_H-peakH);
  }
  ctx.lineTo(W,H-GROUND_H); ctx.closePath(); ctx.fill();
  ctx.globalAlpha=1;
}

function drawCloud(c) {
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.ellipse(c.x,c.y,c.w/2,c.h/2,0,0,Math.PI*2);
  ctx.ellipse(c.x-c.w*0.28,c.y+5,c.w*0.28,c.h*0.55,0,0,Math.PI*2);
  ctx.ellipse(c.x+c.w*0.28,c.y+6,c.w*0.3,c.h*0.5,0,0,Math.PI*2);
  ctx.fill();
}

function drawGround(scroll) {
  if(scroll) groundOffset=(groundOffset+pipeSpeed)%40;
  const gy = H-GROUND_H; // ground top Y

  // Dirt base
  const dirtColor = skyTheme>=3?'#2a0a00':skyTheme>=2?'#5a3020':'#c8a96e';
  ctx.fillStyle=dirtColor; ctx.fillRect(0,gy,W,GROUND_H);

  // Dirt stripe detail
  ctx.fillStyle=skyTheme>=3?'#1a0600':skyTheme>=2?'#3a1a0a':'#b8944a';
  ctx.fillRect(0,gy+18,W,6);

  // Grass top strip
  const grassC  = skyTheme>=3?'#2a0a00':skyTheme>=2?'#3a1a06':'#5dab24';
  const grassC2 = skyTheme>=3?'#1a0500':skyTheme>=2?'#2a1000':'#4a9a1a';
  ctx.fillStyle=grassC; ctx.fillRect(0,gy,W,13);

  // Small grass blades
  ctx.fillStyle=grassC2;
  for(let x=-groundOffset;x<W+40;x+=18){
    ctx.beginPath(); ctx.moveTo(x,gy+13); ctx.quadraticCurveTo(x+4,gy+2,x+8,gy+13); ctx.fill();
  }

  // ── Ground decorations (parallax scrolling) ──────────────────
  if(groundDecos) groundDecos.forEach(d=>{
    if(scroll&&gameState==='playing'){ d.x-=pipeSpeed*d.speed; if(d.x<-60) d.x=W+60; }

    if(d.type==='rock'){
      // Layered rock with highlight
      const rc = skyTheme>=3?'#2a1000':skyTheme>=2?'#5a4030':'#7a7a82';
      const rh = skyTheme>=3?'#3a1a08':skyTheme>=2?'#7a6050':'#a0a0aa';
      ctx.fillStyle=rc;
      ctx.beginPath(); ctx.ellipse(d.x,gy+d.h*0.9,d.w/2,d.h/2,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=rh;
      ctx.beginPath(); ctx.ellipse(d.x-d.w*0.15,gy+d.h*0.55,d.w*0.28,d.h*0.22,-.4,0,Math.PI*2); ctx.fill();

    } else if(d.type==='wisteria'){
      // Stem
      const sC = skyTheme>=2?'#3a1a00':'#5a7a20';
      ctx.strokeStyle=sC; ctx.lineWidth=1.5; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(d.x,gy); ctx.lineTo(d.x,gy-d.stemH); ctx.stroke();
      // Petal cluster — lavender/purple, darkens with sky theme
      const pC = skyTheme>=3?'#2a0a0a':skyTheme>=2?'#4a1a1a':'#c070ff';
      const pC2= skyTheme>=3?'#1a0506':skyTheme>=2?'#3a1030':'#a040ee';
      ctx.fillStyle=pC;
      for(let j=0;j<d.petals;j++){
        const a=(j/d.petals)*Math.PI*2, r=d.size*1.0;
        ctx.beginPath(); ctx.arc(d.x+Math.cos(a)*r*0.9,gy-d.stemH+Math.sin(a)*r*0.55,d.size*0.75,0,Math.PI*2); ctx.fill();
      }
      ctx.fillStyle=pC2;
      ctx.beginPath(); ctx.arc(d.x,gy-d.stemH,d.size*0.85,0,Math.PI*2); ctx.fill();
      // Tiny yellow centre
      if(skyTheme<2){ ctx.fillStyle='#ffe060'; ctx.beginPath(); ctx.arc(d.x,gy-d.stemH,d.size*0.28,0,Math.PI*2); ctx.fill(); }

    } else if(d.type==='tallgrass'){
      const tgC = skyTheme>=3?'#3a1000':skyTheme>=2?'#4a2800':'#6ab820';
      ctx.strokeStyle=tgC; ctx.lineWidth=1.8; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(d.x,gy+2);
      ctx.quadraticCurveTo(d.x+d.lean,gy-d.h*0.55,d.x+d.lean*0.6,gy-d.h);
      ctx.stroke();
      // Seed head
      const shC = skyTheme>=3?'#4a1800':skyTheme>=2?'#5a3010':'#90cc40';
      ctx.fillStyle=shC;
      ctx.beginPath(); ctx.ellipse(d.x+d.lean*0.6,gy-d.h,2,5,0.25,0,Math.PI*2); ctx.fill();

    } else if(d.type==='bamboo'){
      const bC  = skyTheme>=3?'#2a0e00':skyTheme>=2?'#3a2a00':'#4a8a18';
      const bC2 = skyTheme>=3?'#1a0800':skyTheme>=2?'#2a1c00':'#3a7010';
      const segH = 10;
      const segs = Math.floor(d.h/segH);
      ctx.lineWidth=4; ctx.lineCap='butt';
      for(let s=0;s<segs;s++){
        ctx.strokeStyle = s%2===0?bC:bC2;
        const y0=gy-s*segH, y1=gy-(s+1)*segH;
        ctx.beginPath(); ctx.moveTo(d.x,y0); ctx.lineTo(d.x,y1); ctx.stroke();
      }
      // Node rings
      ctx.strokeStyle=skyTheme>=2?'#5a3800':'#2a5a08'; ctx.lineWidth=2;
      for(let s=1;s<segs;s++){
        const ny=gy-s*segH;
        ctx.beginPath(); ctx.moveTo(d.x-3,ny); ctx.lineTo(d.x+3,ny); ctx.stroke();
        // Tiny leaf
        if(s%2===0 && skyTheme<2){
          ctx.fillStyle='#5aaa18'; ctx.beginPath();
          ctx.ellipse(d.x+(s%3===0?5:-5),ny-2,5,2,s%3===0?0.4:-0.4,0,Math.PI*2); ctx.fill();
        }
      }
    }
  });

  // Bushes (drawn last so they're on top)
  if(bushes) bushes.forEach(b=>{
    if(scroll&&gameState==='playing'){ b.x-=pipeSpeed*0.4; if(b.x+b.size*2<0) b.x=W+b.size; }
    ctx.fillStyle=skyTheme>=3?'#1a0500':skyTheme>=2?'#330d00':'#3d8b1a';
    ctx.beginPath(); ctx.arc(b.x,gy+2,b.size,Math.PI,0); ctx.fill();
    ctx.fillStyle=skyTheme>=3?'#280800':skyTheme>=2?'#4a1500':'#4da620';
    ctx.beginPath(); ctx.arc(b.x-b.size*0.3,gy,b.size*0.7,Math.PI,0); ctx.fill();
    ctx.beginPath(); ctx.arc(b.x+b.size*0.3,gy,b.size*0.65,Math.PI,0); ctx.fill();
  });
}

function drawPipe(p) {
  // oscillate after level 3
  if (p.oscAmp>0) { p.topH = p.baseTopH + Math.sin(p.oscPhase)*p.oscAmp; p.oscPhase+=p.oscSpeed; }
  const bottomY=p.topH+pipeGap, capH=22, capW=PIPE_WIDTH+12, capX=p.x-6;
  // tint pipes red in blood moon stage
  const pipeMain = skyTheme>=3?'#5a1a00':skyTheme>=2?'#3d5a00':'#3dba4e';
  const pipeDark = skyTheme>=3?'#3a0a00':skyTheme>=2?'#2a3d00':'#2ea040';
  function body(y1,y2){
    ctx.fillStyle=pipeMain; ctx.fillRect(p.x,y1,PIPE_WIDTH,y2-y1);
    const s=ctx.createLinearGradient(p.x,0,p.x+PIPE_WIDTH,0);
    s.addColorStop(0,'rgba(255,255,255,0.2)'); s.addColorStop(0.35,'rgba(255,255,255,0.06)'); s.addColorStop(1,'rgba(0,0,0,0.12)');
    ctx.fillStyle=s; ctx.fillRect(p.x,y1,PIPE_WIDTH,y2-y1);
  }
  function cap(cy){
    ctx.fillStyle=pipeDark; ctx.fillRect(capX,cy,capW,capH);
    ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(capX,cy+capH-4,capW,4);
  }
  body(0,p.topH-capH); cap(p.topH-capH);
  body(bottomY+capH,H-GROUND_H); cap(bottomY);
}

function drawCoin(c) {
  c.spin+=0.08;
  ctx.save(); ctx.translate(c.x,c.y); ctx.scale(Math.abs(Math.cos(c.spin)),1);
  const g=ctx.createRadialGradient(-2,-2,1,0,0,9); g.addColorStop(0,'#ffee55'); g.addColorStop(1,'#cc8800');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,9,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ffdd00'; ctx.beginPath(); ctx.arc(-1,-1,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#aa6600'; ctx.font='bold 8px Arial'; ctx.textAlign='center'; ctx.fillText('★',0,3);
  ctx.restore();
  // glow
  ctx.globalAlpha=0.3+0.2*Math.abs(Math.sin(c.spin));
  ctx.fillStyle='#ffcc00';
  ctx.beginPath(); ctx.arc(c.x,c.y,14,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
}

function drawPowerUp(p) {
  p.pulse+=0.07;
  const glow=0.4+0.4*Math.abs(Math.sin(p.pulse));
  if(p.type==='shield'){
    const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,22);
    g.addColorStop(0,`rgba(80,160,255,${glow})`); g.addColorStop(1,'rgba(40,80,255,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(p.x,p.y,22,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#4499ff'; ctx.beginPath(); ctx.arc(p.x,p.y,9,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#aaddff'; ctx.beginPath(); ctx.arc(p.x-2,p.y-2,5,0,Math.PI*2); ctx.fill();
    ctx.font='bold 10px Arial'; ctx.fillStyle='#fff'; ctx.textAlign='center';
    ctx.fillText('🛡',p.x,p.y+4);
  } else if (p.type==='superShield') {
    // Golden super-shield orb
    const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,26);
    g.addColorStop(0,`rgba(255,230,60,${glow})`); g.addColorStop(0.5,`rgba(255,160,0,${glow*0.7})`); g.addColorStop(1,'rgba(200,80,0,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(p.x,p.y,26,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffcc00'; ctx.beginPath(); ctx.arc(p.x,p.y,10,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff5aa'; ctx.beginPath(); ctx.arc(p.x-2,p.y-2,5,0,Math.PI*2); ctx.fill();
    // star ring
    ctx.shadowColor='#ffd700'; ctx.shadowBlur=10;
    ctx.strokeStyle=`rgba(255,215,0,${glow})`; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(p.x,p.y,16,0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0;
    ctx.font='bold 10px Arial'; ctx.fillStyle='#fff'; ctx.textAlign='center';
    ctx.fillText('✨',p.x,p.y+4);
  }
}

// ────────────────────────────────────────────────
//  Draw bird
// ────────────────────────────────────────────────
function drawBirdAt(x, y, def, angle, wingAngle, scale=1) {
  ctx.save();
  ctx.translate(x,y); ctx.rotate(angle); ctx.scale(scale,scale);
  const R=16, wf=(gliding && scale===1) ? 8 : Math.sin(wingAngle)*6;

  // invincible aura — secret mode
  if (invincible && scale===1) {
    const ia=0.3+0.2*Math.abs(Math.sin(performance.now()*0.005));
    ctx.fillStyle=`rgba(255,215,0,${ia})`;
    ctx.beginPath(); ctx.arc(0,0,R+10,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=`rgba(255,240,100,${ia+0.2})`; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,0,R+10,0,Math.PI*2); ctx.stroke();
  }

  // shield aura
  if (shieldActive && scale===1) {
    const sa=0.4+0.3*Math.abs(Math.sin(shieldTimer*0.1));
    ctx.fillStyle=shieldIsSuper?`rgba(255,200,0,${sa})`:`rgba(80,160,255,${sa})`;
    ctx.beginPath(); ctx.arc(0,0,R+8,0,Math.PI*2); ctx.fill();
    if (shieldIsSuper) {
      ctx.strokeStyle=`rgba(255,230,80,${sa+0.2})`; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(0,0,R+10,0,Math.PI*2); ctx.stroke();
    }
  }

  // Elemental aura — shown during gameplay and waiting
  if (scale===1 && (gameState==='playing'||gameState==='waiting')) {
    const t=performance.now()*0.001;
    if (selectedBird===0) {
      // Tanjiro — pulsing water rings
      for (let i=0;i<3;i++) {
        const r=R+4+Math.sin(t*2.2+i*2.1)*3;
        ctx.strokeStyle=`rgba(80,180,255,${0.14+Math.sin(t*2.2+i*2.1)*0.06})`;
        ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
      }
    } else if (selectedBird===1) {
      // Zenitsu — crackling electric arcs
      ctx.shadowColor='#ffee00'; ctx.shadowBlur=8;
      for (let i=0;i<3;i++) {
        const a=t*5+i*Math.PI*2/3;
        const r0=R*0.75, r1=R+8;
        ctx.strokeStyle=`rgba(255,238,0,${0.55+Math.random()*0.3})`;
        ctx.lineWidth=1.2;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*r0, Math.sin(a)*r0);
        ctx.lineTo(Math.cos(a)*(r0+(r1-r0)*0.5)+(Math.random()-0.5)*5, Math.sin(a)*(r0+(r1-r0)*0.5)+(Math.random()-0.5)*5);
        ctx.lineTo(Math.cos(a)*r1+(Math.random()-0.5)*3, Math.sin(a)*r1+(Math.random()-0.5)*3);
        ctx.stroke();
      }
      ctx.shadowBlur=0;
    } else if (selectedBird===2) {
      // Inosuke — rotating wind arc slashes
      ctx.lineWidth=1.8; ctx.lineCap='round';
      for (let i=0;i<3;i++) {
        const a=t*2.5+i*Math.PI*2/3;
        ctx.strokeStyle=`rgba(85,255,170,${0.35+Math.sin(t*3+i)*0.15})`;
        ctx.beginPath(); ctx.arc(0,0,R+6,a,a+0.85); ctx.stroke();
      }
    } else if (selectedBird===3) {
      // Rengoku — flame corona spikes
      ctx.shadowColor='#ff4400'; ctx.shadowBlur=12;
      for (let i=0;i<7;i++) {
        const a=t*2.2+i*Math.PI*2/7;
        const fh=7+Math.sin(t*4+i*1.3)*4;
        const fg=ctx.createLinearGradient(Math.cos(a)*R,Math.sin(a)*R,Math.cos(a)*(R+fh),Math.sin(a)*(R+fh)-3);
        fg.addColorStop(0,'rgba(255,100,0,0.85)'); fg.addColorStop(1,'rgba(255,220,0,0)');
        ctx.strokeStyle=fg; ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.moveTo(Math.cos(a)*R,Math.sin(a)*R); ctx.lineTo(Math.cos(a)*(R+fh),Math.sin(a)*(R+fh)-3); ctx.stroke();
      }
      ctx.shadowBlur=0;
    } else if (selectedBird===4) {
      // Shinobu — faint violet petal orbit
      ctx.shadowColor='#cc44ff'; ctx.shadowBlur=6;
      for (let i=0;i<5;i++){
        const a=t*2.8+i*Math.PI*2/5, r=R+7;
        ctx.fillStyle=`rgba(204,102,255,${0.3+Math.sin(t*3+i)*0.12})`;
        ctx.beginPath(); ctx.ellipse(Math.cos(a)*r,Math.sin(a)*r,3,1.5,a,0,Math.PI*2); ctx.fill();
      }
      ctx.shadowBlur=0;
    } else if (selectedBird===5) {
      // Tengen — sound ring pulses
      for (let i=0;i<2;i++){
        const r=R+5+Math.sin(t*4+i*Math.PI)*4;
        ctx.strokeStyle=`rgba(255,220,60,${0.2+Math.sin(t*4+i*Math.PI)*0.1})`;
        ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
      }
    } else if (selectedBird===6) {
      // Muichiro — slow mist rings
      for (let i=0;i<2;i++){
        const r=R+3+Math.sin(t*1.5+i*Math.PI)*5;
        ctx.strokeStyle=`rgba(80,220,210,${0.15+Math.sin(t*1.5+i*Math.PI)*0.08})`;
        ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
      }
    } else if (selectedBird===7) {
      // Mitsuri — soft pink glow ring
      ctx.strokeStyle=`rgba(255,100,180,${0.18+Math.sin(t*2.5)*0.08})`;
      ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,R+5,0,Math.PI*2); ctx.stroke();
    } else if (selectedBird===8) {
      // Giyu — deep blue still-water ring
      for (let i=0;i<2;i++){
        const r=R+3+Math.sin(t*1.8+i*Math.PI)*4;
        ctx.strokeStyle=`rgba(30,100,200,${0.16+Math.sin(t*1.8+i*Math.PI)*0.07})`;
        ctx.lineWidth=1.8; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
      }
    } else if (selectedBird===9) {
      // Gyomei — faint earth-brown ring
      ctx.strokeStyle=`rgba(180,140,80,${0.12+Math.sin(t*1.2)*0.06})`;
      ctx.lineWidth=2.5; ctx.beginPath(); ctx.arc(0,0,R+5,0,Math.PI*2); ctx.stroke();
    } else if (selectedBird===10) {
      // Sanemi — fast rotating wind arcs
      ctx.lineWidth=1.6; ctx.lineCap='round';
      for (let i=0;i<3;i++){
        const a=t*4+i*Math.PI*2/3;
        ctx.strokeStyle=`rgba(150,255,200,${0.28+Math.sin(t*4+i)*0.12})`;
        ctx.beginPath(); ctx.arc(0,0,R+6,a,a+0.7); ctx.stroke();
      }
    } else if (selectedBird===11) {
      // Obanai — serpent-green coil ring
      ctx.strokeStyle=`rgba(60,200,120,${0.16+Math.sin(t*2)*0.08})`;
      ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,R+5,0,Math.PI*2); ctx.stroke();
    }
  }

  ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.beginPath(); ctx.ellipse(2,R+4,R*0.9,5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=def.wg1; ctx.beginPath(); ctx.moveTo(-R,2); ctx.lineTo(-R-10,-3+wf*0.4); ctx.lineTo(-R-6,8); ctx.closePath(); ctx.fill();
  ctx.fillStyle=def.wg1; ctx.beginPath(); ctx.ellipse(-2,5+wf,11,7,-0.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=def.wg2; ctx.beginPath(); ctx.ellipse(-3,3+wf,6,3.5,-0.4,0,Math.PI*2); ctx.fill();
  const bg=ctx.createRadialGradient(-3,-4,2,0,0,R);
  bg.addColorStop(0,def.body1); bg.addColorStop(0.6,def.body2); bg.addColorStop(1,def.bodyDk);
  ctx.fillStyle=bg; ctx.beginPath(); ctx.ellipse(0,0,R,R*0.88,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=def.belly; ctx.beginPath(); ctx.ellipse(4,4,8,7,0.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(7,-5,5.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=def.eye; ctx.beginPath(); ctx.arc(7.5,-5,3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(8,-5,2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(9,-6.5,1,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=def.bk1; ctx.beginPath(); ctx.moveTo(12,-1); ctx.lineTo(21,2); ctx.lineTo(12,6); ctx.closePath(); ctx.fill();
  ctx.fillStyle=def.bk2; ctx.beginPath(); ctx.moveTo(12,2.5); ctx.lineTo(21,2); ctx.lineTo(12,3); ctx.fill();

  // Helmet
  ctx.strokeStyle='#8b4513'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,R+1,0.1,Math.PI-0.1); ctx.stroke();
  const hg=ctx.createRadialGradient(-4,-R-4,2,0,-R+2,18);
  hg.addColorStop(0,def.h1); hg.addColorStop(0.6,def.h2); hg.addColorStop(1,def.h2);
  ctx.fillStyle=hg; ctx.beginPath(); ctx.ellipse(0,-R+4,R+3,12,0,Math.PI,0); ctx.fill();
  ctx.fillStyle=def.hb; ctx.beginPath(); ctx.ellipse(0,-R+4,R+5,5,0,Math.PI,0); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.beginPath(); ctx.ellipse(-4,-R-2,5,3,-0.5,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#5d3a1a'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(-R+2,-2); ctx.quadraticCurveTo(-R-2,4,-R+4,9); ctx.stroke();

  // Character-specific extras
  if (def.extras) def.extras(0, 0, R);

  ctx.restore();
}

// ────────────────────────────────────────────────
//  Draw: Select screen
// ────────────────────────────────────────────────
function secLabel(text, y) {
  ctx.font='bold 13px Arial'; ctx.fillStyle='rgba(220,180,255,0.9)'; ctx.textAlign='center';
  ctx.fillText(text,W/2,y);
  const tw=ctx.measureText(text).width;
  ctx.strokeStyle='rgba(150,80,255,0.4)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(W/2-tw/2-14,y+4); ctx.lineTo(W/2+tw/2+14,y+4); ctx.stroke();
}

function drawSelectScreen() {
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a0015'); g.addColorStop(1,'#1a0035');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  drawStars();

  ctx.textAlign='center';
  ctx.font=`bold ${Math.round(W*0.062)}px Segoe UI,Arial`;
  ctx.fillStyle='#ff4444'; ctx.shadowColor='rgba(255,50,50,0.8)'; ctx.shadowBlur=20;
  ctx.fillText('⚔️ DEMON SLAYER BIRD', W/2, H*0.09);
  ctx.shadowBlur=0;
  ctx.font=`${Math.round(W*0.023)}px Arial`; ctx.fillStyle='#cc99ff';
  ctx.fillText('Choose your Breath Style and take flight!', W/2, H*0.135);

  // Screen size (desktop only — mobile auto-scales)
  if (!isMobile) {
    secLabel('SCREEN SIZE', H*0.183);
    SIZE_KEYS.forEach((k,i)=>{
      const r=getSizeRect(i), isSel=selectedSize_key===k, isH=hoverSize===k;
      ctx.fillStyle=isSel?'rgba(150,80,255,0.25)':isH?'rgba(255,255,255,0.08)':'rgba(255,255,255,0.04)';
      ctx.strokeStyle=isSel?'#aa55ff':isH?'rgba(255,255,255,0.3)':'rgba(255,255,255,0.12)';
      ctx.lineWidth=isSel?2:1;
      ctx.beginPath(); ctx.roundRect(r.x,r.y,r.w,r.h,8); ctx.fill(); ctx.stroke();
      ctx.font=`bold ${isSel?15:14}px Arial`; ctx.fillStyle=isSel?'#cc88ff':'#9977cc'; ctx.textAlign='center';
      ctx.fillText(SIZE_DEFS[k].label,r.x+r.w/2,r.y+r.h/2+5);
    });
  }

  // Bird selection
  secLabel('CHOOSE YOUR SLAYER', H*0.228);
  for(let i=0;i<12;i++){
    const b=getBirdRect(i), def=BIRD_DEFS[i];
    const isSel=selectedBird===i, isH=hoverBird===i;
    ctx.fillStyle=isSel?'rgba(255,50,50,0.15)':isH?'rgba(255,255,255,0.06)':'rgba(255,255,255,0.03)';
